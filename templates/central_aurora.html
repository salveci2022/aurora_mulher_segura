<!doctype html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Central Aurora</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
background:#0f0f18;
color:white;
font-family:Arial;
margin:0;
transition: background-color 0.5s;
}

.topo{
background:#1b1b2f;
padding:15px;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #333;
}

#map{
height:65vh;
width:100%;
}

#lista{
padding:10px;
}

.alerta{
background:#1c1c2b;
padding:10px;
margin-bottom:10px;
border-left:5px solid #ff4fc8;
transition: all 0.3s;
}

.alerta-novo{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{background:#1c1c2b;}
50%{background:#5a004f;}
100%{background:#1c1c2b;}
}

.alerta-global{
animation:flash 1s infinite;
}

@keyframes flash{
0%{background:#0f0f18;}
50%{background:#330022;}
100%{background:#0f0f18;}
}

.notificacao-visual {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff4fc8;
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(255,79,200,0.5);
    animation: slideIn 0.5s;
    z-index: 1000;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

</style>

</head>

<body>

<div class="topo">
🚨 CENTRAL AURORA - MONITORAMENTO
</div>

<div id="map"></div>

<div id="lista"></div>

<audio id="sirene" preload="auto">
<source src="/static/sirene.mp3" type="audio/mpeg">
</audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-15.78,-47.93],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let markers={}
let ultimoId=null
let audioHabilitado = true

function mostrarNotificacaoVisual(mensagem) {
    const notificacao = document.createElement('div')
    notificacao.className = 'notificacao-visual'
    notificacao.innerHTML = `🔴 ${mensagem}`
    document.body.appendChild(notificacao)
    
    setTimeout(() => {
        notificacao.style.animation = 'slideIn 0.5s reverse'
        setTimeout(() => {
            document.body.removeChild(notificacao)
        }, 500)
    }, 3000)
}

function tocarSirene(){
    const audio=document.getElementById("sirene")
    
    if (!audioHabilitado) return
    
    // Tenta tocar o áudio
    const playPromise = audio.play()
    
    if (playPromise !== undefined) {
        playPromise.catch(() => {
            // Fallback visual se não conseguir tocar áudio
            audioHabilitado = false
            mostrarNotificacaoVisual('NOVO ALERTA - Áudio bloqueado pelo navegador')
            
            // Piscar a tela como fallback
            document.body.classList.add("alerta-global")
            setTimeout(() => {
                document.body.classList.remove("alerta-global")
            }, 3000)
        })
    }
}

function alertaTela(){
    document.body.classList.add("alerta-global")
    setTimeout(() => {
        document.body.classList.remove("alerta-global")
    }, 5000)
}

async function carregarAlertas(){
    try {
        const r = await fetch("/api/alerts")
        const dados = await r.json()
        
        const lista=document.getElementById("lista")
        lista.innerHTML=""
        
        dados.reverse().forEach(alerta=>{
            const div=document.createElement("div")
            div.className="alerta"
            
            if(alerta.id===ultimoId){
                div.classList.add("alerta-novo")
            }
            
            const localizacao = (alerta.lat && alerta.lng) ? '📍 Com localização' : '❌ Sem localização'
            
            div.innerHTML=`
                <b>${alerta.name}</b><br>
                ${alerta.situation}<br>
                ${alerta.ts_br}<br>
                <small>${localizacao}</small>
            `
            
            lista.appendChild(div)
            
            if(alerta.lat && alerta.lng){
                if(!markers[alerta.id]){
                    markers[alerta.id]=L.marker([alerta.lat,alerta.lng]).addTo(map)
                    markers[alerta.id].bindPopup(`
                        <b>${alerta.name}</b><br>
                        ${alerta.situation}<br>
                        ${alerta.ts_br}
                    `)
                    
                    map.setView([alerta.lat,alerta.lng],16)
                    
                    if(ultimoId !== null){
                        tocarSirene()
                        alertaTela()
                        mostrarNotificacaoVisual(`NOVO ALERTA: ${alerta.name}`)
                    }
                }
            }
        })
        
        if(dados.length){
            ultimoId=dados[dados.length-1].id
        }
        
    } catch (error) {
        console.error('Erro ao carregar alertas:', error)
        lista.innerHTML = '<div style="color: #f44336; padding: 20px;">❌ Erro ao conectar com servidor</div>'
    }
}

// Tentar reabilitar áudio se o usuário interagir com a página
document.addEventListener('click', function() {
    audioHabilitado = true
}, { once: true })

setInterval(carregarAlertas,500)

carregarAlertas()

// Tentar obter localização do usuário para centralizar o mapa
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            map.setView([pos.coords.latitude, pos.coords.longitude], 13)
        },
        function() {
            console.log("Usando localização padrão (Brasília)")
        }
    )
}

</script>

</body>
</html>
