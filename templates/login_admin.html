<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora Mulher Segura - Admin</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#7a00ff">

<link rel="icon" type="image/png" href="{{ url_for('static', filename='icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">

<style>

body{
background:linear-gradient(135deg,#2a003f,#4b006e);
font-family:Arial;
margin:0;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:#2a003f;
padding:30px;
border-radius:14px;
width:380px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#150022;
color:white;
}

button{
margin-top:15px;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-salvar{
background:#00c853;
color:white;
width:100%;
}

.btn-sair{
background:#444;
color:white;
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Pessoas de Confiança</h2>

<input id="p1" placeholder="Nome / telefone pessoa 1">

<input id="p2" placeholder="Nome / telefone pessoa 2">

<input id="p3" placeholder="Nome / telefone pessoa 3">

<button class="btn-salvar" onclick="salvarTrusted()">
Salvar
</button>

<button class="btn-sair" onclick="logout()">
Sair
</button>

</div>

<script>

function salvarTrusted(){

let data={
p1:document.getElementById("p1").value,
p2:document.getElementById("p2").value,
p3:document.getElementById("p3").value
}

fetch("/api/trusted/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

.then(()=>{

alert("Pessoas de confiança salvas")

})

}

function logout(){

window.location="/panel/logout"

}

</script>

</body>
</html>
