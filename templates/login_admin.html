<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora - Login Admin</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1a0520,#2d0a40,#1a0520);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:350px;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
color:#ff6b9d;
}

.card{

background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);

}

input{

width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
font-weight:bold;
cursor:pointer;

}

.error{

background:#ff4444;
padding:10px;
border-radius:8px;
margin-bottom:15px;
text-align:center;

}

</style>

</head>
<body>

<div class="container">

<div class="logo">
<h1>AURORA</h1>
<p>Painel Administrativo</p>
</div>

<div class="card">

{% if error %}
<div class="error">
❌ {{error}}
</div>
{% endif %}

<form method="POST">

<input type="text"
name="username"
placeholder="Usuário"
required>

<input type="password"
name="password"
placeholder="Senha"
required>

<button type="submit">
ENTRAR
</button>

</form>

</div>

</div>

</body>
</html>
