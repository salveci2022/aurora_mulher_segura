<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Aurora</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#7a00ff">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">⚙️</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Admin Login</div>
                    </div>
                </div>
                <div class="top-actions">
                    <a href="/panic" class="pill">🚨 SOS</a>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">Login Admin</h1>
                <p class="center muted small">Usuário padrão: admin · Senha: admin123</p>

                {% if error %}
                <div class="alert alert-danger center">Usuário ou senha inválidos.</div>
                {% endif %}

                <form method="POST" action="/panel/login">
                    <label class="label">Usuário</label>
                    <input type="text" name="user" class="input" placeholder="admin" required>

                    <label class="label">Senha</label>
                    <input type="password" name="password" class="input" placeholder="admin123" required>

                    <button type="submit" class="btn btn-primary">Entrar</button>
                </form>

                <div style="text-align:center;margin-top:15px;">
                    <a href="/health" class="link">Diagnóstico</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
