<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Aurora Mulher Segura - Login Confiança</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#7a00ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/png" href="{{ url_for('static', filename='icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1a0033,#2d005a);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.center-wrap{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.aurora-card{
    width:100%;
    max-width:420px;
    background:linear-gradient(145deg,#2d005a,#1a0033);
    border-radius:28px;
    padding:28px 24px;
    box-shadow:0 30px 60px rgba(0,0,0,0.7);
    border:1px solid rgba(255,79,200,0.25);
}

.topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:24px;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.brand-dot{
    width:50px;
    height:50px;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    background:radial-gradient(circle at 30% 30%,rgba(255,121,218,0.9),rgba(164,92,255,0.75));
    box-shadow:0 10px 20px -5px rgba(255,79,200,0.5);
}

.brand-title{
    font-size:20px;
    font-weight:800;
    letter-spacing:.5px;
}

.brand-sub{
    font-size:13px;
    color:#cdb7e6;
}

.h1{
    text-align:center;
    margin:0 0 6px 0;
    font-size:28px;
    font-weight:900;
    color:#ff4fc8;
}

.sub{
    text-align:center;
    margin-bottom:24px;
    color:#e9dfff;
    font-size:14px;
}

.input-group{
    margin-bottom:16px;
}

.label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    color:#e9dfff;
    font-weight:700;
}

.input{
    width:100%;
    padding:15px 16px;
    border-radius:18px;
    border:1px solid rgba(255,79,200,0.25);
    background:rgba(255,255,255,0.05);
    color:white;
    font-size:15px;
    outline:none;
    box-sizing:border-box;
}

.input::placeholder{
    color:#b9a9d6;
}

.input:focus{
    border-color:#ff4fc8;
    box-shadow:0 0 0 3px rgba(255,79,200,0.12);
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:22px;
    cursor:pointer;
    font-size:16px;
    font-weight:800;
    color:white;
    background:linear-gradient(135deg,#ff4fc8,#7a00ff);
    box-shadow:0 12px 28px rgba(122,0,255,0.35);
    margin-top:8px;
}

.btn:hover{
    filter:brightness(1.05);
}

.info-box{
    margin-top:18px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,79,200,0.18);
    border-radius:18px;
    padding:14px;
    font-size:12px;
    color:#ddd0ff;
    line-height:1.5;
}

.links{
    margin-top:16px;
    text-align:center;
    font-size:13px;
}

.links a{
    color:#ff9be3;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="center-wrap">
    <div class="aurora-card">

        <div class="topbar">
            <div class="brand">
                <div class="brand-dot">🌸</div>
                <div>
                    <div class="brand-title">AURORA</div>
                    <div class="brand-sub">Pessoa de Confiança</div>
                </div>
            </div>
        </div>

        <h1 class="h1">Login Confiança</h1>
        <div class="sub">Entre para acompanhar alertas da usuária em tempo real.</div>

        <form method="POST" action="/trusted/login">

            <div class="input-group">
                <label class="label">Usuário</label>
                <input class="input" type="text" name="username" placeholder="Digite o usuário" required>
            </div>

            <div class="input-group">
                <label class="label">Senha</label>
                <input class="input" type="password" name="password" placeholder="Digite a senha" required>
            </div>

            <button class="btn" type="submit">🔐 ENTRAR NO PAINEL</button>

        </form>

        <div class="info-box">
            ✅ Após o login, o sistema abre o painel da pessoa de confiança.<br>
            ✅ A sirene toca no painel quando um novo alerta chega.<br>
            ✅ O mapa poderá ser aberto direto pelo painel.
        </div>

        <div class="links">
            <a href="/">← Voltar ao início</a>
        </div>

    </div>
</div>

</body>
</html>
