<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confiança · Aurora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">🌸</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Login Confiança</div>
                    </div>
                </div>
                <div class="top-actions">
                    <a href="/panic" class="pill">🚨 SOS</a>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">Pessoa de Confiança</h1>
                <p class="center muted small">Acesse o painel para acompanhar alertas</p>

                {% if error %}
                <div class="alert alert-danger center">Usuário ou senha inválidos.</div>
                {% endif %}

                <form method="POST" action="/trusted/login">
                    <label class="label">Usuário</label>
                    <input type="text" name="user" class="input" placeholder="samara123" required>

                    <label class="label">Senha</label>
                    <input type="password" name="password" class="input" placeholder="36092745" required>

                    <button type="submit" class="btn btn-primary">Entrar no Painel</button>
                </form>

                <div style="text-align:center;margin-top:15px;">
                    <a href="/trusted/recover" class="link">Esqueci a senha</a>
                    <span style="margin:0 10px;color:var(--muted)">·</span>
                    <a href="/panel/login" class="link">Admin</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
