<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Pessoa de Confiança</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">🌸</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Pessoa de Confiança</div>
                    </div>
                </div>
                <div class="top-actions">
                    <a href="/panic" class="pill">🚨 SOS</a>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">Login</h1>
                <p class="center muted small">Acesse para acompanhar alertas</p>

                {% if error %}
                <div class="alert alert-danger center">
                    Usuário ou senha inválidos!
                </div>
                {% endif %}

                <form method="POST" action="/trusted/login">
                    <label class="label">👤 Usuário</label>
                    <input type="text" name="user" class="input" placeholder="Digite seu usuário" required>
                    
                    <label class="label">🔑 Senha</label>
                    <input type="password" name="password" class="input" placeholder="Digite sua senha" required>
                    
                    <button type="submit" class="btn btn-primary" style="margin-top:15px;">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
