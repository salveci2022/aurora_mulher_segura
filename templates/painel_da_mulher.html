<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Aurora Mulher Segura - Painel da Mulher</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #1a0033, #2d005a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    
    .painel-mulher {
      max-width: 420px;
      width: 100%;
      background: linear-gradient(145deg, #2d005a, #1a0033);
      border-radius: 40px;
      padding: 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,79,200,0.3);
    }
    
    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    
    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 48px;
      height: 48px;
      background: radial-gradient(circle at 30% 30%, rgba(255,121,218,0.9), rgba(164,92,255,0.75));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      box-shadow: 0 10px 20px -5px rgba(255,79,200,0.5);
    }
    
    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }
    
    .logo-text p {
      font-size: 12px;
      color: #a89cc0;
    }
    
    .header-actions {
      display: flex;
      gap: 6px;
    }
    
    .header-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,79,200,0.2);
      color: #d4c4f0;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .header-btn:hover {
      background: rgba(255,79,200,0.2);
      color: white;
      border-color: #ff4fc8;
    }
    
    /* SEÇÃO DE SITUAÇÃO */
    .section-title {
      color: #ffb0f0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin: 20px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-title span {
      font-size: 18px;
    }
    
    .situation-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .situation-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,79,200,0.2);
      border-radius: 20px;
      padding: 16px 12px;
      color: #e0d0ff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(5px);
    }
    
    .situation-btn:hover {
      background: rgba(255,79,200,0.15);
      border-color: #ff4fc8;
      transform: translateY(-2px);
    }
    
    .situation-btn.active {
      background: linear-gradient(145deg, rgba(255,79,200,0.25), rgba(164,92,255,0.25));
      border-color: #ff4fc8;
      box-shadow: 0 0 20px rgba(255,79,200,0.3);
    }
    
    .situation-btn span {
      font-size: 20px;
    }
    
    /* CAMPOS DE INPUT */
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-label {
      display: block;
      color: #cdb7e6;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .input-field {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255,79,200,0.3);
      border-radius: 20px;
      padding: 16px 18px;
      color: white;
      font-size: 16px;
      transition: all 0.2s;
    }
    
    .input-field:focus {
      outline: none;
      border-color: #ff4fc8;
      background: rgba(0, 0, 0, 0.4);
    }
    
    .input-field::placeholder {
      color: #665a7a;
    }
    
    textarea.input-field {
      min-height: 80px;
      resize: vertical;
    }
    
    /* BOTÃO SOS */
    .sos-container {
      display: flex;
      justify-content: center;
      margin: 30px 0 20px;
    }
    
    .sos-btn {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 50% 45%, rgba(255,79,200,0.95), rgba(164,92,255,0.8) 55%, rgba(40,0,60,0.9));
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 0 10px rgba(255,79,200,0.2), 0 0 0 20px rgba(164,92,255,0.1), 0 20px 40px rgba(0,0,0,0.6);
      border: 4px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
      font-weight: bold;
    }
    
    .sos-btn span {
      font-size: 48px;
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    
    .sos-btn small {
      font-size: 14px;
      letter-spacing: 1px;
      margin-top: 5px;
      color: rgba(255,255,255,0.9);
    }
    
    .sos-btn.holding {
      transform: scale(1.05);
      box-shadow: 0 0 0 15px rgba(255,79,200,0.3), 0 0 0 30px rgba(164,92,255,0.2), 0 30px 50px rgba(0,0,0,0.7);
    }
    
    .sos-btn.sent {
      background: radial-gradient(circle at 50% 45%, #4caf50, #2e7d32);
      box-shadow: 0 0 0 10px rgba(76,175,80,0.2), 0 0 0 20px rgba(76,175,80,0.1);
    }
    
    /* STATUS */
    .status-box {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,79,200,0.3);
      border-radius: 30px;
      padding: 15px;
      margin: 20px 0;
      text-align: center;
      color: white;
      font-size: 14px;
    }
    
    /* LOCALIZAÇÃO - DRIVER SHIELD 360 */
    .location-box {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,79,200,0.3);
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
    }
    
    .location-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffb0f0;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    #locTxt {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      color: #a0e0ff;
      word-break: break-all;
      line-height: 1.6;
    }
    
    #locHint {
      color: #cdb7e6;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }
    
    /* BOTÃO PDF */
    .pdf-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 16px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 10px 20px -5px rgba(34,197,94,0.4);
    }
    
    .pdf-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(34,197,94,0.6);
    }
    
    .pdf-btn span {
      font-size: 20px;
    }
    
    /* RODAPÉ */
    .footer {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,79,200,0.15);
      color: #665a7a;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="painel-mulher">
    <!-- HEADER -->
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">♀</div>
        <div class="logo-text">
          <h1>AURORA</h1>
          <p>Mulher Segura</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="goFullScreen()">⛶</button>
        <button class="header-btn" onclick="location.reload()">↻</button>
        <button class="header-btn" onclick="window.location.href='/'">✕</button>
      </div>
    </div>

    <!-- SITUAÇÃO -->
    <div class="section-title">
      <span>⚠️</span> SITUAÇÃO
    </div>
    
    <div class="situation-grid">
      <button class="situation-btn active" data-value="Assédio">
        <span>🚫</span> Assédio
      </button>
      <button class="situation-btn" data-value="Violência">
        <span>👊</span> Violência
      </button>
      <button class="situation-btn" data-value="Perseguição">
        <span>👀</span> Perseguição
      </button>
      <button class="situation-btn" data-value="Emergência médica">
        <span>🏥</span> Emergência médica
      </button>
      <button class="situation-btn" data-value="Local suspeito">
        <span>⚠️</span> Local suspeito
      </button>
      <button class="situation-btn" data-value="Outro">
        <span>❓</span> Outro
      </button>
    </div>

    <!-- NOME -->
    <div class="input-group">
      <label class="input-label">👤 SEU NOME</label>
      <input type="text" id="nomeInput" class="input-field" value="SALVECI DOS SANTOS" placeholder="Digite seu nome">
    </div>

    <!-- MENSAGEM -->
    <div class="input-group">
      <label class="input-label">💬 MENSAGEM (OPCIONAL)</label>
      <textarea id="mensagemInput" class="input-field" rows="3" placeholder="Descreva rapidamente o que está acontecendo">Preciso de ajuda urgente!</textarea>
    </div>

    <!-- BOTÃO SOS -->
    <div class="sos-container">
      <div class="sos-btn" id="sosBtn">
        <span>SOS</span>
        <small>TOQUE E SEGURE</small>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status-box" id="statusMsg">
      🌸 Sistema pronto - selecione uma situação
    </div>

    <!-- LOCALIZAÇÃO - DRIVER SHIELD 360 -->
    <div class="location-box">
      <div class="location-title">
        <span>📍</span> LOCALIZAÇÃO DRIVER SHIELD 360
      </div>
      <div id="locTxt">Inicializando GPS...</div>
      <div id="locHint">Ative o GPS e permita o acesso à localização</div>
    </div>

    <!-- BOTÃO PDF -->
    <button class="pdf-btn" id="pdfBtn">
      <span>📄</span>
      BAIXAR RELATÓRIO COMPLETO
    </button>

    <!-- RODAPÉ -->
    <div class="footer">
      <span>🌸 POR PTB2</span>
      <span id="dataHora"></span>
    </div>
  </div>

  <script>
    // ===== DATA E HORA =====
    function atualizarDataHora() {
      const agora = new Date();
      const horas = agora.getHours().toString().padStart(2, '0');
      const minutos = agora.getMinutes().toString().padStart(2, '0');
      const dia = agora.getDate().toString().padStart(2, '0');
      const mes = (agora.getMonth() + 1).toString().padStart(2, '0');
      const ano = agora.getFullYear();
      document.getElementById('dataHora').textContent = `${horas}:${minutos} ${dia}/${mes}/${ano}`;
    }
    setInterval(atualizarDataHora, 1000);
    atualizarDataHora();

    // ===== TELA CHEIA =====
    function goFullScreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
    }

    // ===== SITUAÇÃO =====
    const situationBtns = document.querySelectorAll('.situation-btn');
    let situacaoSelecionada = 'Assédio';

    situationBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        situationBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        situacaoSelecionada = this.dataset.value;
        document.getElementById('statusMsg').innerHTML = `✅ Situação: ${situacaoSelecionada}`;
      });
    });

    // ===== TECNOLOGIA DRIVER SHIELD 360 - LOCALIZAÇÃO PERFEITA =====
    let watchId = null;
    let lastPos = null;
    let posHistory = []; // Histórico de posições (como o Driver Shield)
    let locationAccuracy = 0;

    function showLocationStatus(msg, color) {
      const locHint = document.getElementById('locHint');
      if (locHint) {
        locHint.innerHTML = msg;
        locHint.style.color = color;
      }
    }

    function processPosition(position) {
      const newPos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude,
        acc: position.coords.accuracy,
        alt: position.coords.altitude,
        heading: position.coords.heading,
        speed: position.coords.speed,
        timestamp: position.timestamp
      };
      
      // Guarda no histórico (últimas 10 posições)
      posHistory.unshift(newPos);
      if (posHistory.length > 10) posHistory.pop();
      
      // Só atualiza se for mais preciso
      if (!lastPos || newPos.acc < lastPos.acc) {
        lastPos = newPos;
        locationAccuracy = newPos.acc;
      }
      
      console.log('📍 Driver Shield 360:', newPos);
      updateLocationUI();
    }

    function updateLocationUI() {
      if (!lastPos) return;
      
      const locTxt = document.getElementById('locTxt');
      const locHint = document.getElementById('locHint');
      
      // Formatação profissional (igual Driver Shield)
      const latStr = lastPos.lat.toFixed(6);
      const lngStr = lastPos.lng.toFixed(6);
      
      // Determina qualidade do sinal
      let quality = '';
      let qualityColor = '';
      
      if (lastPos.acc <= 3) {
        quality = 'EXATIDÃO MÁXIMA (±3m)';
        qualityColor = '#4caf50';
        locHint.innerHTML = '✅ SINAL PERFEITO - Ideal para provas';
      } else if (lastPos.acc <= 5) {
        quality = 'PRECISÃO EXCELENTE (±5m)';
        qualityColor = '#4caf50';
        locHint.innerHTML = '✅ GPS DE ALTA PRECISÃO';
      } else if (lastPos.acc <= 10) {
        quality = 'PRECISÃO BOA (±10m)';
        qualityColor = '#8bc34a';
        locHint.innerHTML = '✅ Sinal bom - Aguardando satélites';
      } else if (lastPos.acc <= 20) {
        quality = 'PRECISÃO MÉDIA (±20m)';
        qualityColor = '#ff9800';
        locHint.innerHTML = '⚠️ Sinal médio - Tente área aberta';
      } else {
        quality = 'PRECISÃO BAIXA (±' + Math.round(lastPos.acc) + 'm)';
        qualityColor = '#f44336';
        locHint.innerHTML = '❌ Sinal fraco - Vá para área externa';
      }
      
      // Informações adicionais (igual Driver Shield)
      let extraInfo = '';
      if (lastPos.speed !== null) {
        extraInfo += `<br>🚗 Velocidade: ${(lastPos.speed * 3.6).toFixed(1)} km/h`;
      }
      if (lastPos.heading !== null) {
        extraInfo += `<br>🧭 Direção: ${lastPos.heading.toFixed(0)}°`;
      }
      if (posHistory.length > 1) {
        const oldest = posHistory[posHistory.length - 1];
        const timeDiff = (lastPos.timestamp - oldest.timestamp) / 1000; // segundos
        if (timeDiff > 0) {
          const distance = Math.sqrt(Math.pow(lastPos.lat - oldest.lat, 2) + Math.pow(lastPos.lng - oldest.lng, 2)) * 111000; // metros aproximados
          if (distance > 5) {
            extraInfo += `<br>📊 Movimento: ${distance.toFixed(0)}m em ${timeDiff.toFixed(0)}s`;
          }
        }
      }
      
      // Monta display profissional
      locTxt.innerHTML = `
        <div style="color: ${qualityColor}; font-weight: bold;">${quality}</div>
        <div style="font-size: 12px; color: #a89cc0; margin-top: 5px;">
          📍 Latitude: ${latStr}<br>
          📍 Longitude: ${lngStr}
        </div>
        ${extraInfo}
      `;
    }

    function handleLocationError(error) {
      let msg = '';
      switch(error.code) {
        case error.PERMISSION_DENIED:
          msg = '❌ Permissão negada - Ative o GPS nas configurações';
          break;
        case error.POSITION_UNAVAILABLE:
          msg = '❌ Sinal indisponível - Vá para área aberta';
          break;
        case error.TIMEOUT:
          msg = '⏳ Buscando sinal GPS... Aguarde';
          // Tenta novamente
          setTimeout(() => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            startLocationTracking();
          }, 5000);
          break;
      }
      showLocationStatus(msg, '#f44336');
    }

    function startLocationTracking() {
      if (!navigator.geolocation) {
        showLocationStatus('❌ GPS não disponível', '#f44336');
        return;
      }

      // Configuração PROFISSIONAL - mesma do Driver Shield
      const options = {
        enableHighAccuracy: true,      // FORÇA GPS REAL (não WiFi)
        timeout: 30000,                // 30s para captar satélites
        maximumAge: 0,                  // NÃO usa cache
        distanceFilter: 5                // Atualiza a cada 5 metros (economiza bateria)
      };

      // PRIMEIRA LEITURA - Rápida para resposta imediata
      navigator.geolocation.getCurrentPosition(
        (position) => {
          processPosition(position);
          showLocationStatus('📍 GPS ATIVADO - Aguardando melhor precisão...', '#ff9800');
          
          // INICIA MONITORAMENTO CONTÍNUO (igual Driver Shield)
          if (watchId) navigator.geolocation.clearWatch(watchId);
          watchId = navigator.geolocation.watchPosition(
            (pos) => {
              processPosition(pos);
            },
            (err) => handleLocationError(err),
            options
          );
        },
        (err) => {
          // Se falhar, tenta mesmo assim com watch
          if (watchId) navigator.geolocation.clearWatch(watchId);
          watchId = navigator.geolocation.watchPosition(
            (pos) => {
              processPosition(pos);
            },
            (err) => handleLocationError(err),
            options
          );
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // Função para obter localização NO MOMENTO DO ALERTA (igual Driver Shield)
    async function getLocationForAlert() {
      return new Promise((resolve) => {
        if (!lastPos) {
          // Se não tem posição, tenta pegar uma rápida
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              resolve({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                acc: pos.coords.accuracy
              });
            },
            () => resolve(null),
            { enableHighAccuracy: true, timeout: 5000 }
          );
        } else {
          resolve(lastPos);
        }
      });
    }

    // Inicia o tracking ao carregar
    startLocationTracking();

    // Verifica permissões
    if (navigator.permissions) {
      navigator.permissions.query({ name: 'geolocation' }).then(result => {
        if (result.state === 'denied') {
          showLocationStatus('❌ GPS bloqueado - Ative nas configurações', '#f44336');
        }
      });
    }

    // ===== HOLD DO BOTÃO SOS =====
    const sosBtn = document.getElementById('sosBtn');
    const statusMsg = document.getElementById('statusMsg');
    let timerHold = null;
    let isHolding = false;

    function iniciarHold(e) {
      e.preventDefault();
      if (isHolding) return;
      isHolding = true;

      sosBtn.classList.add('holding');
      statusMsg.innerHTML = '⚠️ Segure para enviar...';

      timerHold = setTimeout(() => {
        enviarAlerta();
        isHolding = false;
      }, 1000);
    }

    function cancelarHold(e) {
      e.preventDefault();
      if (timerHold) clearTimeout(timerHold);
      sosBtn.classList.remove('holding');
      isHolding = false;
      
      if (!statusMsg.innerHTML.includes('ENVIADO')) {
        statusMsg.innerHTML = '🌸 Alerta cancelado';
      }
    }

    sosBtn.addEventListener('mousedown', iniciarHold);
    sosBtn.addEventListener('mouseup', cancelarHold);
    sosBtn.addEventListener('mouseleave', cancelarHold);
    sosBtn.addEventListener('touchstart', iniciarHold, { passive: false });
    sosBtn.addEventListener('touchend', cancelarHold);
    sosBtn.addEventListener('touchcancel', cancelarHold);

    // ===== ENVIAR ALERTA =====
    async function enviarAlerta() {
      const nome = document.getElementById('nomeInput').value.trim() || 'Usuária';
      const mensagem = document.getElementById('mensagemInput').value.trim() || '';

      // Pega a localização mais precisa no momento do envio
      const location = await getLocationForAlert();

      const payload = {
        name: nome,
        situation: situacaoSelecionada,
        message: mensagem,
        lat: location ? location.lat : null,
        lng: location ? location.lng : null,
        accuracy: location ? location.acc : null
      };

      sosBtn.classList.add('sent');
      sosBtn.innerHTML = '<span>✓</span><small>ENVIADO</small>';
      statusMsg.innerHTML = '📤 Enviando alerta...';

      try {
        const res = await fetch('/api/send_alert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.ok) {
          statusMsg.innerHTML = '✅ ALERTA ENVIADO COM SUCESSO!';
        } else {
          throw new Error('Erro no servidor');
        }
      } catch (e) {
        statusMsg.innerHTML = '❌ Erro ao enviar alerta';
      }

      setTimeout(() => {
        sosBtn.classList.remove('sent');
        sosBtn.innerHTML = '<span>SOS</span><small>TOQUE E SEGURE</small>';
      }, 3000);
    }

    // ===== PDF =====
    document.getElementById('pdfBtn').addEventListener('click', () => {
      window.open('/relatorio/pdf', '_blank');
      statusMsg.innerHTML = '📄 Gerando PDF...';
      setTimeout(() => {
        statusMsg.innerHTML = '🌸 Sistema pronto';
      }, 2000);
    });
  </script>
</body>
</html>
