<!DOCTYPE html>
<html>
<head>

<title>Painel Confiança</title>

</head>

<body style="background:#1a0028;color:white;font-family:Arial">

<h2>🚨 Painel de Alertas</h2>

<div id="alert"></div>

<script>

let current=null

async function check(){

const res=await fetch("/api/last_alert")

const data=await res.json()

if(data.alert){

const a=data.alert

document.getElementById("alert").innerHTML=

"<b>Nome:</b>"+a.nome+"<br>"+
"<b>Situação:</b>"+a.situacao+"<br>"+
"<b>Mensagem:</b>"+a.mensagem+"<br>"+
"<b>Hora:</b>"+a.hora+"<br>"+
"<a target='_blank' href='https://maps.google.com/?q="+a.lat+","+a.lng+"'>Abrir mapa</a>"

}

}

setInterval(check,3000)

</script>

</body>
</html>
