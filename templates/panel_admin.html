<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora Mulher Segura - Admin</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#7a00ff">

<link rel="icon" type="image/png" href="{{ url_for('static', filename='icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
background:#1b0033;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#2e0055;
padding:25px;
border-radius:12px;
margin-top:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.btn-map{
background:#2e9fff;
color:white;
}

.btn-clear{
background:#ff4444;
color:white;
}

.btn-history{
background:#00b894;
color:white;
}

.btn-logout{
background:#555;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>🛡️ PAINEL ADMIN</h1>

<div class="card">

<h2>Último Alerta</h2>

<p><b>Nome:</b> <span id="name">---</span></p>

<p><b>Situação:</b> <span id="situation">---</span></p>

<p><b>Hora:</b> <span id="time">---</span></p>

<a id="mapLink" target="_blank">
<button class="btn-map">📍 Abrir no mapa</button>
</a>

</div>

<div class="card">

<h3>Controles</h3>

<button class="btn-clear" onclick="limparAlertas()">
🗑 Limpar Alertas
</button>

<button class="btn-history" onclick="abrirHistorico()">
📜 Ver Histórico
</button>

<button class="btn-logout" onclick="logout()">
🚪 Sair
</button>

</div>

</div>

<script>

async function carregarUltimo(){

try{

const res = await fetch("/api/last_alert")
const data = await res.json()

if(data.last){

const a = data.last

document.getElementById("name").innerText = a.name
document.getElementById("situation").innerText = a.situation
document.getElementById("time").innerText = a.ts_br

if(a.location){

const lat = a.location.lat
const lng = a.location.lng

document.getElementById("mapLink").href =
"https://maps.google.com/?q="+lat+","+lng

}

}

}catch(e){

console.log("erro",e)

}

}

async function limparAlertas(){

if(confirm("Deseja limpar todos os alertas?")){

await fetch("/api/clear",{method:"POST"})
alert("Alertas removidos")

}

}

function abrirHistorico(){

window.location="/historico"

}

function logout(){

window.location="/logout"

}

setInterval(carregarUltimo,3000)

carregarUltimo()

</script>

</body>
</html>
