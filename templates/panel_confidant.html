<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora • Pessoa de Confiança</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>

.sos-alert{

width:200px;
height:200px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

margin:30px auto;

font-size:40px;
font-weight:bold;

color:white;

background:radial-gradient(circle,#7a1b9a,#2b0040);

box-shadow:0 0 30px #ff00ff;

transition:0.3s;

}

.sos-alert.active{

background:red;

box-shadow:0 0 40px red;

}

.mapa{

margin-top:20px;
border-radius:10px;
overflow:hidden;

}

.btn-area{

display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;

}

</style>

</head>

<body>

<div class="aurora-bg">
<div class="center-wrap">
<div class="aurora-card">

<h1 class="h1 center">PAINEL DE ALERTA</h1>

<p class="center muted">
Aguardando alerta do Aurora
</p>

<div id="alertBox" class="alert center">

Nenhum alerta recebido

</div>

<!-- BOTÃO SOS -->

<div id="alertSOS" class="sos-alert">

SOS

</div>

<!-- MAPA -->

<div id="mapa" class="mapa"></div>

<!-- BOTÕES -->

<div class="btn-area">

<button onclick="reenviar()" class="btn btn-primary">
📤 Reenviar
</button>

<button onclick="limpar()" class="btn btn-danger">
🧹 Limpar
</button>

<button onclick="sair()" class="btn">
↻ Sair
</button>

</div>

</div>
</div>
</div>

<audio id="sirene">

<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">

</audio>

<script>

let ultimoAlerta = null


function tocarSirene(){

let audio = document.getElementById("sirene")

audio.play().catch(()=>{})

}


function mostrarMapa(lat,lng){

document.getElementById("mapa").innerHTML = `
<iframe
width="100%"
height="260"
frameborder="0"
style="border:0;border-radius:10px"
src="https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed"
allowfullscreen>
</iframe>
`

}


function verificarAlertas(){

fetch("/api/alerts")

.then(res=>res.json())

.then(data=>{

if(data.length == 0) return

let alerta = data[data.length - 1]

if(!ultimoAlerta || ultimoAlerta.hora != alerta.hora){

ultimoAlerta = alerta

mostrarAlerta(alerta)

}

})

}


function mostrarAlerta(alerta){

document.getElementById("alertSOS").classList.add("active")

tocarSirene()

document.getElementById("alertBox").innerHTML =

"<b>🚨 ALERTA RECEBIDO</b><br><br>" +

"Nome: " + alerta.nome + "<br>" +

"Situação: " + alerta.situacao + "<br>" +

"Mensagem: " + alerta.mensagem + "<br>" +

"Hora: " + alerta.hora


if(alerta.localizacao){

let lat = alerta.localizacao.lat
let lng = alerta.localizacao.lng

mostrarMapa(lat,lng)

}

}


function reenviar(){

if(!ultimoAlerta) return

fetch("/api/alert",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(ultimoAlerta)

})

}


function limpar(){

document.getElementById("alertBox").innerHTML = "Nenhum alerta recebido"

document.getElementById("mapa").innerHTML = ""

document.getElementById("alertSOS").classList.remove("active")

}


function sair(){

location.reload()

}


setInterval(verificarAlertas,3000)

</script>

</body>
</html>
