<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora • Painel de Alerta</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.sos-alert {
    width: 200px; height: 200px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 30px auto; font-size: 40px; font-weight: bold; color: white;
    background: radial-gradient(circle, #7a1b9a, #2b0040);
    box-shadow: 0 0 30px #ff00ff; transition: 0.3s; cursor: pointer;
}
.sos-alert.active { background: red; box-shadow: 0 0 40px red; animation: pulse-sos 1s infinite; }
@keyframes pulse-sos { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.mapa { margin-top: 20px; border-radius: 10px; overflow: hidden; }
.btn-area { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
.btn-danger { background: rgba(244,67,54,0.7); border-radius: 12px; padding: 10px 18px; font-size: 14px; }
</style>
</head>
<body>
<div class="aurora-bg"><div class="center-wrap"><div class="aurora-card">
    <div class="topbar">
        <div class="brand">
            <div class="brand-dot">🔔</div>
            <div><div class="brand-title">AURORA</div><div class="brand-sub">Painel de Alerta</div></div>
        </div>
        <div class="top-actions"><a href="/" class="pill">← Sair</a></div>
    </div>
    <div class="content">
        <h1 class="h1 center">PAINEL DE ALERTA</h1>
        <p class="center muted">Aguardando alerta do Aurora</p>
        <div id="alertBox" class="alert center">Nenhum alerta recebido</div>
        <div id="alertSOS" class="sos-alert" onclick="toggleSirene()">SOS</div>
        <div id="mapa" class="mapa"></div>
        <div class="btn-area">
            <button onclick="reenviar()" class="btn btn-primary">📤 Reenviar</button>
            <button onclick="limpar()" class="btn btn-danger">🧹 Limpar</button>
            <button onclick="sair()" class="btn pill">↻ Sair</button>
        </div>
    </div>
</div></div></div>

<audio id="sirene" loop>
    <source src="/static/audio/sirene.mp3" type="audio/mpeg">
    <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>
let ultimoAlerta = null;
let sireneAtiva = false;

function tocarSirene() {
    const audio = document.getElementById("sirene");
    audio.play().catch(() => {});
    sireneAtiva = true;
    document.getElementById("alertSOS").classList.add("active");
}
function pararSirene() {
    const audio = document.getElementById("sirene");
    audio.pause(); audio.currentTime = 0;
    sireneAtiva = false;
    document.getElementById("alertSOS").classList.remove("active");
}
function toggleSirene() { sireneAtiva ? pararSirene() : tocarSirene(); }

function mostrarMapa(lat, lng) {
    document.getElementById("mapa").innerHTML =
        `<iframe width="100%" height="260" frameborder="0" style="border:0;border-radius:10px"
        src="https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed" allowfullscreen></iframe>`;
}

function verificarAlertas() {
    fetch("/api/alerts")
        .then(res => res.json())
        .then(data => {
            if (!data || data.length === 0) return;
            const alerta = data[data.length - 1];
            // FIX: Compare by id, not by non-existent "hora" field
            if (!ultimoAlerta || ultimoAlerta.id !== alerta.id) {
                ultimoAlerta = alerta;
                mostrarAlerta(alerta);
            }
        })
        .catch(err => console.error("Erro:", err));
}

function mostrarAlerta(alerta) {
    document.getElementById("alertSOS").classList.add("active");
    tocarSirene();
    // FIX: Use correct field names: name, situation, message, ts (not nome/situacao/mensagem/hora)
    document.getElementById("alertBox").innerHTML =
        "<b>🚨 ALERTA RECEBIDO</b><br><br>" +
        "Nome: " + (alerta.name || "Não informado") + "<br>" +
        "Situação: " + (alerta.situation || "Emergência") + "<br>" +
        "Mensagem: " + (alerta.message || "") + "<br>" +
        "Hora: " + (alerta.ts || "Agora");
    // FIX: Check top-level lat/lng first, then nested location object
    const lat = alerta.lat || (alerta.location && alerta.location.lat);
    const lng = alerta.lng || (alerta.location && alerta.location.lng);
    if (lat && lng) mostrarMapa(parseFloat(lat), parseFloat(lng));
}

function reenviar() {
    if (!ultimoAlerta) return;
    // FIX: Correct endpoint /api/send_alert (was /api/alert which doesn't exist)
    fetch("/api/send_alert", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(ultimoAlerta)
    });
}

function limpar() {
    document.getElementById("alertBox").innerHTML = "Nenhum alerta recebido";
    document.getElementById("mapa").innerHTML = "";
    pararSirene();
    ultimoAlerta = null;
}
function sair() { location.href = "/"; }

setInterval(verificarAlertas, 3000);
verificarAlertas();
</script>
</body>
</html>
