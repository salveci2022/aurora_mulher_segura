<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Aurora - Pessoa de Confiança</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>

body{
background:#1b0030;
font-family:Arial;
color:white;
text-align:center;
}

.sirene{

width:120px;
height:120px;
border-radius:60px;
background:#444;
margin:auto;
margin-top:40px;
transition:0.3s;

}

.sirene.alerta{

background:red;
box-shadow:0 0 30px red;

}

#map{

width:90%;
height:400px;
margin:auto;
margin-top:20px;
border-radius:10px;

}

button{

margin:10px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:5px;

}

</style>

</head>

<body>

<h2>Painel de Confiança</h2>

<div id="sirene" class="sirene"></div>

<div id="map"></div>

<br>

<button onclick="reenviar()">Reenviar</button>
<button onclick="limpar()">Limpar</button>
<button onclick="logout()">Sair</button>

<script src="https://maps.googleapis.com/maps/api/js"></script>

<script>

let mapa
let marcador

function iniciarMapa(){

mapa = new google.maps.Map(document.getElementById("map"),{
zoom:16,
center:{lat:-15.793889,lng:-47.882778}
})

}

iniciarMapa()

function atualizarMapa(lat,lng){

const pos={lat:lat,lng:lng}

mapa.setCenter(pos)

if(marcador){
marcador.setMap(null)
}

marcador=new google.maps.Marker({
position:pos,
map:mapa
})

}

// =======================
// VERIFICAR ALERTAS
// =======================

function verificarAlertas(){

fetch("/api/alerts")

.then(res=>res.json())

.then(data=>{

if(data.length===0) return

const ultimo=data[data.length-1]

document.getElementById("sirene").classList.add("alerta")

if(ultimo.localizacao){

atualizarMapa(
ultimo.localizacao.lat,
ultimo.localizacao.lng
)

}

})

}

setInterval(verificarAlertas,3000)

function reenviar(){
location.reload()
}

function limpar(){

document.getElementById("sirene").classList.remove("alerta")

}

function logout(){
window.location="/"
}

</script>

</body>
</html>
