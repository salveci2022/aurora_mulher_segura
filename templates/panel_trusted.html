<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora - Pessoa de Confiança</title>

<meta name="theme-color" content="#2d0a40">

<style>

/* aparência original preservada */

body{
font-family:'Segoe UI',system-ui;
background:linear-gradient(135deg,#1a0520,#2d0a40,#1a0520);
color:white;
padding:15px;
}

.container{
max-width:420px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-icon{
width:45px;
height:45px;
background:linear-gradient(135deg,#ff6b9d,#c44569);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:1.5rem;
}

.status-badge{
display:flex;
align-items:center;
gap:8px;
background:rgba(0,255,136,0.15);
padding:8px 15px;
border-radius:20px;
}

.status-dot{
width:8px;
height:8px;
background:#00ff88;
border-radius:50%;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1}
50%{opacity:.4}
}

.main-card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:25px;
margin-bottom:20px;
text-align:center;
}

.siren-button{

width:120px;
height:120px;
border-radius:50%;
background:linear-gradient(135deg,#ffd700,#ffaa00);
border:none;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;

}

.alert-card{
background:rgba(255,0,0,0.2);
border:2px solid red;
border-radius:15px;
padding:20px;
display:none;
margin-top:20px;
}

.alert-card.active{
display:block;
}

.btn-map{
width:100%;
padding:15px;
margin-top:15px;
background:#00d2ff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.action-buttons{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:20px;
}

.btn-action{
padding:12px;
border-radius:10px;
border:none;
cursor:pointer;
}

.btn-resend{background:orange}
.btn-clear{background:#9333ea;color:white}
.btn-exit{background:red;color:white}

.waiting{
text-align:center;
margin:20px;
opacity:.7;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
<div class="logo-icon">🌸</div>
<div>
<div>AURORA</div>
<div style="font-size:12px">Pessoa de Confiança</div>
</div>
</div>

<div class="status-badge">
<div class="status-dot"></div>
Online
</div>

</div>

<div class="main-card">

<h2>🚨 CENTRAL DE ALERTAS</h2>

<button class="siren-button" id="sirenBtn" onclick="toggleSiren()">
🔔
</button>

<button class="btn-map" onclick="openMap()">
📍 ABRIR LOCALIZAÇÃO
</button>

</div>

<div class="waiting" id="waiting">
⏳ Aguardando alerta...
</div>

<div class="alert-card" id="alertCard">

<h3>🚨 ALERTA</h3>

<div>
<b>Nome:</b> <span id="name"></span>
</div>

<div>
<b>Situação:</b> <span id="situation"></span>
</div>

<div>
<b>Mensagem:</b> <span id="message"></span>
</div>

<div>
<b>Hora:</b> <span id="time"></span>
</div>

<div style="margin-top:10px">

<b>Localização:</b>

<div id="location"></div>

</div>

<div class="action-buttons">

<button class="btn-action btn-resend" onclick="resendAlert()">
🔁 Reenviar
</button>

<button class="btn-action btn-clear" onclick="clearAlert()">
🧹 Limpar
</button>

<button class="btn-action btn-exit" onclick="exitPanel()">
🚪 Sair
</button>

</div>

</div>

</div>

<script>

let currentAlert=null
let siren=false
let audio=null

function toggleSiren(){

siren=!siren

if(siren){

playSiren()

navigator.vibrate?.([500,200,500])

}else{

stopSiren()

}

}

function playSiren(){

audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

audio.loop=true
audio.play()

}

function stopSiren(){

if(audio){
audio.pause()
}

}

async function checkAlert(){

try{

const res=await fetch("/api/last_alert")

const data=await res.json()

if(data.alert){

showAlert(data.alert)

}

}catch(e){

console.log("Erro alerta")

}

}

function showAlert(alert){

currentAlert=alert

document.getElementById("waiting").style.display="none"

document.getElementById("alertCard").classList.add("active")

document.getElementById("name").textContent=alert.nome
document.getElementById("situation").textContent=alert.situacao
document.getElementById("message").textContent=alert.mensagem
document.getElementById("time").textContent=alert.hora

if(alert.localizacao){

document.getElementById("location").innerHTML=
"Lat: "+alert.localizacao.lat+
"<br>Lng: "+alert.localizacao.lng

}

if(!siren){

toggleSiren()

}

}

function openMap(){

if(!currentAlert)return

const lat=currentAlert.localizacao.lat
const lng=currentAlert.localizacao.lng

window.open(
"https://www.google.com/maps?q="+lat+","+lng
)

}

function resendAlert(){

alert("Alerta reenviado!")

}

function clearAlert(){

currentAlert=null

document.getElementById("alertCard").classList.remove("active")

document.getElementById("waiting").style.display="block"

stopSiren()

}

function exitPanel(){

window.location.href="/"

}

setInterval(checkAlert,3000)

</script>

</body>
</html>
