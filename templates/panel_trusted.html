<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Confiança · Aurora</title>

<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>

<style>

/* TODO O SEU CSS ORIGINAL FOI MANTIDO */

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:linear-gradient(135deg,#1a0033,#2d005a);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

.painel-confianca{
max-width:480px;
width:100%;
background:linear-gradient(145deg,#2d005a,#1a0033);
border-radius:40px;
padding:24px;
box-shadow:0 30px 60px rgba(0,0,0,0.7);
border:1px solid rgba(255,79,200,0.3);
}

/* BOTÃO ALERTA */

.sirene-btn.alerta{
background: radial-gradient(circle at 50% 45%, #ff3b3b, #b30000);
box-shadow:
0 0 0 10px rgba(255,0,0,0.25),
0 0 0 25px rgba(255,0,0,0.15),
0 0 50px rgba(255,0,0,0.9);
animation: alertaPulse 1s infinite;
}

@keyframes alertaPulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<div class="painel-confianca">

<div class="topo">

<div class="brand">

<div class="brand-dot">🌸</div>

<div>

<div class="brand-title">AURORA</div>

<div class="brand-sub">Pessoa de Confiança</div>

</div>

</div>

<div class="status-conexao" id="statusConexao">🟢 Online</div>

</div>

<h1 style="color:white;text-align:center;margin-bottom:5px;">
CENTRAL DE ALERTAS
</h1>

<p style="margin-bottom:20px;text-align:center;">
Olá <strong style="color:#ff4fc8;">{{ display_name }}</strong>
</p>

<div class="sirene-container">

<div class="sirene-btn" id="sireneBtn">

<span>🔔</span>

<small>SIRENE</small>

</div>

</div>

<button class="mapa-btn" id="mapaBtn">

<span>📍</span>

ABRIR LOCALIZAÇÃO NO MAPA

</button>

<div id="alertBox">

<div id="lastMeta">

⏳ Aguardando alertas...

</div>

<div id="details"></div>

</div>

<div class="acoes-grid">

<button class="acao-btn reenviar" id="reenviarBtn">

<span>🔄</span>

Reenviar

</button>

<button class="acao-btn limpar" id="limparBtn">

<span>🗑️</span>

Limpar

</button>

<button class="acao-btn sair" id="sairBtn">

<span>🚪</span>

Sair

</button>

</div>

<div class="status-bar" id="statusBar">

Sistema monitorando alertas em tempo real

</div>

<div class="rodape">

<span id="dataHora"></span> • 🌸 AURORA V2.0

</div>

</div>

<script>

const lastMeta=document.getElementById('lastMeta')
const details=document.getElementById('details')
const alertBox=document.getElementById('alertBox')
const sireneBtn=document.getElementById('sireneBtn')
const mapaBtn=document.getElementById('mapaBtn')
const statusBar=document.getElementById('statusBar')

let lastId=0
let sireneAtiva=true
let ultimoAlerta=null

const sireneAudio=new Audio('/static/audio/sirene.mp3')
sireneAudio.loop=true

sireneBtn.addEventListener('click',()=>{
sireneAtiva=!sireneAtiva
sireneBtn.classList.toggle('ativa',sireneAtiva)
if(!sireneAtiva){
sireneAudio.pause()
sireneAudio.currentTime=0
}
})

document.getElementById('limparBtn').onclick=()=>{

lastMeta.innerHTML='⏳ Alertas limpos'
details.innerHTML=''

alertBox.classList.remove('novo')

mapaBtn.classList.remove('visivel')

sireneBtn.classList.remove('alerta')

sireneAudio.pause()
sireneAudio.currentTime=0

statusBar.innerHTML='🧹 Alerta limpo manualmente'

}

document.getElementById('sairBtn').onclick=()=>{
if(confirm('Deseja realmente sair?')){
window.location.href='/logout_trusted'
}
}

async function buscarAlertas(){

try{

const res=await fetch('/api/last_alert?ts='+Date.now())

const data=await res.json()

if(data.ok && data.last){

const alerta=data.last

if(alerta.id>lastId){

lastId=alerta.id
ultimoAlerta=alerta

/* MUDA COR DO BOTÃO */

sireneBtn.classList.add("alerta")

alertBox.classList.add('novo')

if(sireneAtiva){

sireneAudio.play().catch(()=>{})

setTimeout(()=>{
sireneAudio.pause()
sireneAudio.currentTime=0
},10000)

}

statusBar.innerHTML=`🚨 NOVO ALERTA #${alerta.id}`

lastMeta.innerHTML=`<strong>🚨 ALERTA #${alerta.id}</strong>`

let html=''

html+=`👤 <strong>Nome:</strong> ${alerta.name || 'Não informado'}<br>`

html+=`⚠️ <strong>Situação:</strong> ${alerta.situation}<br>`

if(alerta.message){

html+=`💬 <strong>Mensagem:</strong> ${alerta.message}<br>`

}

if(alerta.location){

const{lat,lng}=alerta.location

html+=`📍 <strong>Localização:</strong> ${lat}, ${lng}`

mapaBtn.classList.add('visivel')

}else{

mapaBtn.classList.remove('visivel')

}

details.innerHTML=html

setTimeout(()=>{

alertBox.classList.remove('novo')

},5000)

}

}

}catch(e){

console.log(e)

}

}

setInterval(buscarAlertas,2000)

buscarAlertas()

</script>

</body>
</html>
