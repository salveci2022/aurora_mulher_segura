<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel · Pessoa de Confiança</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .sirene-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, #ff4fc8, #a45cff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            cursor: pointer;
            border: 4px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
            font-size: 40px;
            color: white;
        }
        
        .sirene-btn.ativa {
            background: radial-gradient(circle at 50% 45%, #ff9800, #f57c00);
            animation: pulse 1s infinite;
            box-shadow: 0 0 30px #ff9800;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        #alertBox {
            background: rgba(255,79,200,0.1);
            border: 2px solid #ff4fc8;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
        }
        
        #alertBox.novo {
            background: rgba(255,152,0,0.2);
            border-color: #ff9800;
            animation: brilho 1s infinite;
        }
        
        @keyframes brilho {
            0% { box-shadow: 0 0 10px #ff9800; }
            50% { box-shadow: 0 0 30px #ff9800; }
            100% { box-shadow: 0 0 10px #ff9800; }
        }
        
        .acoes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .acao-btn {
            padding: 15px 5px;
            border-radius: 30px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reenviar { background: #ff9800; }
        .limpar { background: #9c27b0; }
        .sair { background: #f44336; }
        
        .acao-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .mapa-btn {
            width: 100%;
            padding: 12px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            display: none;
        }
        
        .loc-info {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">🌸</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Pessoa de Confiança</div>
                    </div>
                </div>
                <div class="top-actions">
                    <span id="statusConexao">🟢 Online</span>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">CENTRAL DE ALERTAS</h1>
                <p class="center muted small">Olá, <strong>{{ display_name }}</strong></p>

                <div class="sirene-btn" id="sireneBtn">
                    <span>🔔</span>
                    <small style="font-size:14px;">SIRENE</small>
                </div>

                <button class="mapa-btn" id="mapaBtn">📍 ABRIR LOCALIZAÇÃO NO MAPA</button>

                <div id="alertBox">
                    <div id="lastMeta" style="font-size:18px; color:#ff4fc8; margin-bottom:10px;">
                        ⏳ Aguardando alertas...
                    </div>
                    <div id="details" style="color:white; line-height:1.8;"></div>
                </div>

                <div class="acoes-grid">
                    <button class="acao-btn reenviar" id="reenviarBtn">🔄 Reenviar</button>
                    <button class="acao-btn limpar" id="limparBtn">🗑️ Limpar</button>
                    <button class="acao-btn sair" id="sairBtn">🚪 Sair</button>
                </div>

                <div class="status-bar" style="background:rgba(0,0,0,0.3); padding:12px; border-radius:30px; text-align:center;">
                    Sistema monitorando alertas em tempo real
                </div>
            </div>
        </div>
    </div>

    <script>
        const lastMeta = document.getElementById('lastMeta');
        const details = document.getElementById('details');
        const alertBox = document.getElementById('alertBox');
        const sireneBtn = document.getElementById('sireneBtn');
        const mapaBtn = document.getElementById('mapaBtn');
        let lastId = 0;
        let sireneAtiva = false;
        let ultimoAlerta = null;
        
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function tocarSirene() {
            if (!sireneAtiva || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            gain.gain.value = 0.3;
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.linearRampToValueAtTime(1000, now + 0.2);
            osc.frequency.linearRampToValueAtTime(600, now + 0.4);
            
            osc.start(now);
            osc.stop(now + 0.5);
            
            if (sireneAtiva) {
                setTimeout(tocarSirene, 500);
            }
        }
        
        sireneBtn.addEventListener('click', () => {
            initAudio();
            sireneAtiva = !sireneAtiva;
            sireneBtn.classList.toggle('ativa', sireneAtiva);
        });
        
        mapaBtn.addEventListener('click', () => {
            if (ultimoAlerta?.location) {
                const {lat, lng} = ultimoAlerta.location;
                window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
            }
        });
        
        document.getElementById('reenviarBtn').onclick = () => alert('Função em desenvolvimento');
        
        document.getElementById('limparBtn').onclick = () => {
            lastMeta.innerHTML = '⏳ Alertas limpos';
            details.innerHTML = '';
            alertBox.classList.remove('novo');
        };
        
        document.getElementById('sairBtn').onclick = () => {
            window.location.href = '/logout_trusted';
        };
        
        async function buscarAlertas() {
            try {
                const res = await fetch('/api/last_alert?ts=' + Date.now());
                const data = await res.json();
                
                if (data.ok && data.last) {
                    const alerta = data.last;
                    
                    if (alerta.id > lastId) {
                        lastId = alerta.id;
                        ultimoAlerta = alerta;
                        
                        alertBox.classList.add('novo');
                        
                        if (sireneAtiva) tocarSirene();
                        
                        setTimeout(() => {
                            alertBox.classList.remove('novo');
                        }, 5000);
                    }
                    
                    lastMeta.innerHTML = `<strong>🚨 ALERTA #${alerta.id}</strong> - ${alerta.ts_br || alerta.ts}`;
                    
                    let html = '';
                    html += `👤 <strong>Nome:</strong> ${alerta.name}<br>`;
                    html += `⚠️ <strong>Situação:</strong> ${alerta.situation}<br>`;
                    
                    if (alerta.message) html += `💬 <strong>Mensagem:</strong> ${alerta.message}<br>`;
                    
                    if (alerta.location) {
                        const {lat, lng, accuracy} = alerta.location;
                        html += `<div class="loc-info">`;
                        html += `📍 <strong>Localização:</strong><br>`;
                        html += `   Lat: ${lat.toFixed(6)}<br>`;
                        html += `   Lng: ${lng.toFixed(6)}<br>`;
                        if (accuracy) html += `   🎯 Precisão: ±${accuracy.toFixed(0)}m<br>`;
                        html += `</div>`;
                        mapaBtn.style.display = 'block';
                    } else {
                        html += `📍 Localização não compartilhada`;
                        mapaBtn.style.display = 'none';
                    }
                    
                    details.innerHTML = html;
                }
            } catch (e) {
                console.error('Erro:', e);
            }
        }
        
        setInterval(buscarAlertas, 2000);
        buscarAlertas();
        
        setInterval(() => {
            document.getElementById('statusConexao').innerHTML = 
                navigator.onLine ? '🟢 Online' : '🔴 Offline';
        }, 5000);
    </script>
</body>
</html>
