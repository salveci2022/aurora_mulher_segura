<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Confiança · Aurora</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(135deg,#1a0033,#2d005a);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;

font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;

}

.painel-confianca{

max-width:480px;
width:100%;

background:linear-gradient(145deg,#2d005a,#1a0033);

border-radius:40px;

padding:24px;

box-shadow:0 30px 60px rgba(0,0,0,0.7);

border:1px solid rgba(255,79,200,0.3);

}

.topo{

display:flex;
align-items:center;
justify-content:space-between;

margin-bottom:20px;
padding-bottom:15px;

border-bottom:2px solid rgba(255,79,200,0.3);

}

.brand{

display:flex;
align-items:center;
gap:12px;

}

.brand-dot{

width:45px;
height:45px;

background:radial-gradient(circle at 30% 30%,rgba(255,121,218,0.9),rgba(164,92,255,0.75));

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:24px;

box-shadow:0 0 25px rgba(255,79,200,0.5);

}

.brand-title{

font-size:16px;
font-weight:bold;
color:white;

}

.brand-sub{

font-size:12px;
color:#cdb7e6;

}

.status-conexao{

font-size:14px;

padding:5px 10px;

background:rgba(255,255,255,0.1);

border-radius:20px;

}

.sirene-container{

display:flex;
justify-content:center;

margin:20px 0;

}

.sirene-btn{

width:180px;
height:180px;

background:radial-gradient(circle at 50% 45%,rgba(255,121,218,0.95),rgba(138,36,139,0.65) 55%,rgba(40,0,60,0.75));

border-radius:50%;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

color:white;

cursor:pointer;

box-shadow:0 0 0 10px rgba(255,79,200,0.1),
0 0 0 25px rgba(164,92,255,0.07),
0 20px 50px rgba(0,0,0,0.55);

transition:all 0.3s;

border:3px solid rgba(255,255,255,0.2);

user-select:none;

margin:0 auto;

}

.sirene-btn span{

font-size:50px;
font-weight:bold;

color:#180013;

text-shadow:0 1px 0 rgba(255,255,255,0.35);

}

.sirene-btn small{

font-size:14px;

color:#220019;

font-weight:bold;

margin-top:5px;

}

.sirene-btn.ativa{

background:radial-gradient(circle at 50% 45%,#ff9800,#f57c00);

box-shadow:0 0 0 10px rgba(255,152,0,0.2),
0 0 0 25px rgba(255,152,0,0.1),
0 0 50px #ff9800;

animation:pulse 1s infinite;

}

.sirene-btn.ativa span{

color:white;

text-shadow:0 2px 0 #b95f00;

}

@keyframes pulse{

0%{transform:scale(1)}

50%{transform:scale(1.1)}

100%{transform:scale(1)}

}

</style>

</head>

<body>

<div class="painel-confianca">

<div class="topo">

<div class="brand">

<div class="brand-dot">🌸</div>

<div>

<div class="brand-title">AURORA</div>
<div class="brand-sub">Mulher Segura</div>

</div>

</div>

<div class="status-conexao">

Conectado

</div>

</div>

<div class="sirene-container">

<div class="sirene-btn" id="sireneBtn">

<span>SOS</span>

<small>Alerta</small>

</div>

</div>

</div>

<!-- ========================================= -->
<!-- SCRIPT ALERTA TEMPO REAL -->
<!-- ========================================= -->

<script>

let ultimoID = 0;

async function verificarAlerta(){

try{

const res = await fetch("/api/last_alert");

const data = await res.json();

if(!data.alert) return;

if(data.alert.id !== ultimoID){

ultimoID = data.alert.id;

ativarSirene(data.alert);

}

}catch(e){

console.log("erro alerta",e);

}

}

function ativarSirene(alert){

const btn = document.getElementById("sireneBtn");

if(btn){

btn.classList.add("ativa");

}

const audio = new Audio("/static/siren.mp3");

audio.play();

if(alert.location){

const url = "https://maps.google.com/?q="+alert.location;

window.open(url,"_blank");

}

}

setInterval(verificarAlerta,3000);

</script>

</body>
</html>
