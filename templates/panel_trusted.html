<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Confidante</title>

<style>
body {
    background: #0a0014;
    color: white;
    font-family: Arial;
    text-align: center;
}

#btnAlerta {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: gray;
    margin: 20px auto;
}

#mapa {
    margin-top: 15px;
}
</style>
</head>

<body>

<h2>Painel da Pessoa de Confiança</h2>

<div id="btnAlerta"></div>

<div id="alertaBox"></div>

<div id="mapa"></div>

<script>

let ultimoId = null

function tocarSirene(){
    let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")
    audio.play()
}

async function carregarAlertas(){

    let res = await fetch("/api/alerts")
    let dados = await res.json()

    if(!dados.length) return

    let alerta = dados[dados.length - 1]

    document.getElementById("alertaBox").innerHTML = `
        <p><b>${alerta.name}</b></p>
        <p>${alerta.situation}</p>
        <p>${alerta.ts}</p>
    `

    document.getElementById("btnAlerta").style.background = "red"

    // 🔊 só toca quando novo alerta chega
    if(alerta.id !== ultimoId){
        tocarSirene()
        ultimoId = alerta.id
    }

    // 📍 MAPA TEMPO REAL
    if(alerta.lat && alerta.lng){

        let lat = parseFloat(alerta.lat)
        let lng = parseFloat(alerta.lng)

        if(!isNaN(lat) && !isNaN(lng)){

            let frame = document.getElementById("mapaFrame")

            if(!frame){

                document.getElementById("mapa").innerHTML = `
                <iframe
                id="mapaFrame"
                width="100%"
                height="260"
                src="https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed">
                </iframe>
                `

            } else {

                frame.src = `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed`

            }

        }
    }

}

setInterval(carregarAlertas, 2000)
carregarAlertas()

</script>

</body>
</html>
