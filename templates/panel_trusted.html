<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Confiança · Aurora</title>

<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:linear-gradient(135deg,#1a0033,#2d005a);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

.painel-confianca{
max-width:480px;
width:100%;
background:linear-gradient(145deg,#2d005a,#1a0033);
border-radius:40px;
padding:24px;
box-shadow:0 30px 60px rgba(0,0,0,0.7);
border:1px solid rgba(255,79,200,0.3);
}

.sirene-btn.alerta{
background: radial-gradient(circle at 50% 45%, #ff3b3b, #b30000);
box-shadow:
0 0 0 10px rgba(255,0,0,0.25),
0 0 0 25px rgba(255,0,0,0.15),
0 0 50px rgba(255,0,0,0.9);
animation: alertaPulse 1s infinite;
}

@keyframes alertaPulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

#mapa{
height:300px;
border-radius:15px;
margin-top:15px;
display:none;
}

</style>

</head>

<body>

<div class="painel-confianca">

<h1 style="color:white;text-align:center;margin-bottom:10px;">
CENTRAL DE ALERTAS
</h1>

<p style="text-align:center;color:#ff4fc8;">
{{ display_name }}
</p>

<div class="sirene-container">

<div class="sirene-btn" id="sireneBtn">

<span>🔔</span>

<small>SIRENE</small>

</div>

</div>

<button class="mapa-btn" id="mapaBtn">

📍 ABRIR LOCALIZAÇÃO

</button>

<div id="mapa"></div>

<div id="alertBox">

<div id="lastMeta">

⏳ aguardando alertas

</div>

<div id="details"></div>

</div>

<!-- HISTÓRICO DE ALERTAS -->

<div id="historicoAlertas" style="margin-top:15px;color:white;font-size:13px;"></div>

</div>

<script>

const lastMeta=document.getElementById('lastMeta')
const details=document.getElementById('details')
const alertBox=document.getElementById('alertBox')
const sireneBtn=document.getElementById('sireneBtn')

let lastId=0
let ultimoAlerta=null

const sireneAudio=new Audio('/static/audio/sirene.mp3')

let mapa
let marcador

function iniciarMapa(lat,lng){

document.getElementById("mapa").style.display="block"

if(!mapa){

mapa=L.map('mapa').setView([lat,lng],16)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa)

marcador=L.marker([lat,lng]).addTo(mapa)

carregarMapaAlertas()

}else{

mapa.setView([lat,lng],16)

marcador.setLatLng([lat,lng])

}

}

function piscarPainel(){

const painel=document.querySelector(".painel-confianca")

painel.style.boxShadow="0 0 40px red"

setTimeout(()=>{

painel.style.boxShadow="0 30px 60px rgba(0,0,0,0.7)"

},3000)

}

async function carregarHistorico(){

try{

const r = await fetch("/api/alerts")

const dados = await r.json()

let html = "<b>📊 Histórico recente</b><br><br>"

dados.slice(-5).reverse().forEach(a=>{

html += `🚨 ${a.id} - ${a.name} (${a.situation})<br>`

})

document.getElementById("historicoAlertas").innerHTML = html

}catch(e){

console.log("erro historico",e)

}

}

async function carregarMapaAlertas(){

try{

const r = await fetch("/api/alerts")

const dados = await r.json()

dados.forEach(a=>{

if(a.location){

const lat=a.location.lat
const lng=a.location.lng || a.location.lon

L.marker([lat,lng]).addTo(mapa)

}

})

}catch(e){

console.log("erro mapa",e)

}

}

async function buscarAlertas(){

try{

const res=await fetch('/api/last_alert?ts='+Date.now())

const data=await res.json()

if(data.ok && data.last){

const alerta=data.last

if(alerta.id>lastId){

lastId=alerta.id

ultimoAlerta=alerta

piscarPainel()

sireneBtn.classList.add("alerta")

sireneAudio.play().catch(()=>{})

setTimeout(()=>{

sireneAudio.pause()

sireneBtn.classList.remove("alerta")

},10000)

lastMeta.innerHTML=`🚨 ALERTA ${alerta.id}`

let html=''

html+=`👤 ${alerta.name}<br>`

html+=`⚠️ ${alerta.situation}<br>`

if(alerta.message){

html+=`💬 ${alerta.message}<br>`

}

if(alerta.location){

const lat=alerta.location.lat

const lng=alerta.location.lng || alerta.location.lon

html+=`📍 ${lat}, ${lng}`

iniciarMapa(lat,lng)

}

details.innerHTML=html

carregarHistorico()

}

}

}catch(e){

console.log(e)

}

}

setInterval(()=>{

buscarAlertas()

carregarHistorico()

},1000)

buscarAlertas()

</script>

</body>
</html>
