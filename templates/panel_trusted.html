<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel · Pessoa de Confiança</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .sirene-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, #ff4fc8, #a45cff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            cursor: pointer;
            border: 4px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
            font-size: 40px;
            color: white;
        }
        
        .sirene-btn.ativa {
            background: radial-gradient(circle at 50% 45%, #ff9800, #f57c00);
            animation: pulse 1s infinite;
            box-shadow: 0 0 30px #ff9800;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        #alertBox {
            background: rgba(255,79,200,0.1);
            border: 2px solid #ff4fc8;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            transition: all 0.5s;
        }
        
        #alertBox.novo {
            background: rgba(255,152,0,0.3);
            border-color: #ff9800;
            box-shadow: 0 0 30px rgba(255,152,0,0.5);
            animation: brilho 1s infinite;
        }
        
        @keyframes brilho {
            0% { box-shadow: 0 0 10px #ff9800; }
            50% { box-shadow: 0 0 30px #ff9800; }
            100% { box-shadow: 0 0 10px #ff9800; }
        }
        
        .mapa-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2196f3, #1565c0);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0;
            display: none; /* Escondido por padrão */
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(33,150,243,0.3);
            transition: all 0.3s;
        }
        
        .mapa-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33,150,243,0.5);
        }
        
        .mapa-btn.visivel {
            display: block; /* Mostrar quando tiver localização */
        }
        
        .acoes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .acao-btn {
            padding: 15px 5px;
            border-radius: 30px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reenviar { background: #ff9800; }
        .limpar { background: #9c27b0; }
        .sair { background: #f44336; }
        
        .acao-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .loc-info {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #ff4fc8;
        }
        
        .coordenadas {
            font-family: monospace;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 5px;
            margin: 5px 0;
        }
        
        .precisao-excelente { color: #4caf50; font-weight: bold; }
        .precisao-boa { color: #4caf50; }
        .precisao-media { color: #ff9800; }
        .precisao-ruim { color: #f44336; }
    </style>
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">🌸</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Pessoa de Confiança</div>
                    </div>
                </div>
                <div class="top-actions">
                    <span id="statusConexao">🟢 Online</span>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">CENTRAL DE ALERTAS</h1>
                <p class="center muted small">Olá, <strong>{{ display_name }}</strong></p>

                <!-- BOTÃO DA SIRENE -->
                <div class="sirene-btn" id="sireneBtn">
                    <span>🔔</span>
                    <small style="font-size:14px;">SIRENE</small>
                </div>

                <!-- BOTÃO DO MAPA - CORRIGIDO -->
                <button class="mapa-btn" id="mapaBtn">
                    📍 ABRIR LOCALIZAÇÃO NO MAPA
                </button>

                <!-- ÁREA DO ALERTA -->
                <div id="alertBox">
                    <div id="lastMeta" style="font-size:18px; color:#ff4fc8; margin-bottom:10px;">
                        ⏳ Aguardando alertas...
                    </div>
                    <div id="details" style="color:white; line-height:1.8;"></div>
                </div>

                <!-- BOTÕES DE AÇÃO -->
                <div class="acoes-grid">
                    <button class="acao-btn reenviar" id="reenviarBtn">🔄 Reenviar</button>
                    <button class="acao-btn limpar" id="limparBtn">🗑️ Limpar</button>
                    <button class="acao-btn sair" id="sairBtn">🚪 Sair</button>
                </div>

                <!-- STATUS -->
                <div class="status-bar" style="background:rgba(0,0,0,0.3); padding:12px; border-radius:30px; text-align:center;">
                    Sistema monitorando alertas em tempo real
                </div>
            </div>
        </div>
    </div>

    <script>
        const lastMeta = document.getElementById('lastMeta');
        const details = document.getElementById('details');
        const alertBox = document.getElementById('alertBox');
        const sireneBtn = document.getElementById('sireneBtn');
        const mapaBtn = document.getElementById('mapaBtn');
        let lastId = 0;
        let sireneAtiva = true;
        let ultimoAlerta = null;
        
        // ===== SIRENE =====
        const sireneAudio = new Audio('/static/audio/sirene.mp3');
        sireneAudio.loop = true;
        
        sireneBtn.addEventListener('click', () => {
            sireneAtiva = !sireneAtiva;
            sireneBtn.classList.toggle('ativa', sireneAtiva);
            
            if (!sireneAtiva) {
                sireneAudio.pause();
                sireneAudio.currentTime = 0;
            } else if (alertBox.classList.contains('novo')) {
                sireneAudio.play().catch(e => console.log('Erro ao tocar:', e));
            }
        });
        
        document.addEventListener('click', () => {
            if (sireneAtiva && alertBox.classList.contains('novo')) {
                sireneAudio.play().catch(e => console.log('Erro ao tocar:', e));
            }
        }, { once: true });
        
        // ===== MAPA - CORRIGIDO =====
        mapaBtn.addEventListener('click', () => {
            if (ultimoAlerta && ultimoAlerta.location) {
                const lat = ultimoAlerta.location.lat;
                const lng = ultimoAlerta.location.lng;
                
                // Abrir no Google Maps
                const url = `https://www.google.com/maps?q=${lat},${lng}`;
                window.open(url, '_blank');
                
                console.log('📍 Abrindo mapa:', url);
            } else {
                alert('Nenhuma localização disponível para este alerta.');
            }
        });
        
        // ===== BOTÕES =====
        document.getElementById('reenviarBtn').onclick = () => alert('Função em desenvolvimento');
        
        document.getElementById('limparBtn').onclick = () => {
            lastMeta.innerHTML = '⏳ Alertas limpos';
            details.innerHTML = '';
            alertBox.classList.remove('novo');
            mapaBtn.classList.remove('visivel'); // Esconder botão do mapa
            sireneAudio.pause();
            sireneAudio.currentTime = 0;
        };
        
        document.getElementById('sairBtn').onclick = () => {
            window.location.href = '/logout_trusted';
        };
        
        // ===== BUSCAR ALERTAS =====
        async function buscarAlertas() {
            try {
                const res = await fetch('/api/last_alert?ts=' + Date.now());
                const data = await res.json();
                
                if (data.ok && data.last) {
                    const alerta = data.last;
                    
                    // NOVO ALERTA
                    if (alerta.id > lastId) {
                        lastId = alerta.id;
                        ultimoAlerta = alerta;
                        
                        alertBox.classList.add('novo');
                        
                        if (sireneAtiva) {
                            sireneAudio.play().catch(e => console.log('Erro ao tocar:', e));
                        }
                        
                        setTimeout(() => {
                            if (sireneAtiva) {
                                sireneAudio.pause();
                                sireneAudio.currentTime = 0;
                            }
                        }, 10000);
                        
                        setTimeout(() => {
                            alertBox.classList.remove('novo');
                        }, 5000);
                    }
                    
                    // Mostrar informações do alerta
                    lastMeta.innerHTML = `<strong>🚨 ALERTA #${alerta.id}</strong> - ${alerta.ts_br || alerta.ts}`;
                    
                    let html = '';
                    html += `👤 <strong>Nome:</strong> ${alerta.name}<br>`;
                    html += `⚠️ <strong>Situação:</strong> ${alerta.situation}<br>`;
                    
                    if (alerta.message) {
                        html += `💬 <strong>Mensagem:</strong> ${alerta.message}<br>`;
                    }
                    
                    // LOCALIZAÇÃO - CORRIGIDO
                    if (alerta.location) {
                        const {lat, lng, accuracy} = alerta.location;
                        
                        // Definir classe de precisão
                        let precisaoClass = '';
                        let precisaoText = '';
                        
                        if (accuracy <= 10) {
                            precisaoClass = 'precisao-excelente';
                            precisaoText = 'EXCELENTE';
                        } else if (accuracy <= 30) {
                            precisaoClass = 'precisao-boa';
                            precisaoText = 'BOA';
                        } else if (accuracy <= 50) {
                            precisaoClass = 'precisao-media';
                            precisaoText = 'MÉDIA';
                        } else {
                            precisaoClass = 'precisao-ruim';
                            precisaoText = 'RUIM';
                        }
                        
                        html += `<div class="loc-info">`;
                        html += `📍 <strong>LOCALIZAÇÃO EXATA:</strong><br>`;
                        html += `<div class="coordenadas">`;
                        html += `   <strong>Latitude:</strong> ${lat.toFixed(6)}<br>`;
                        html += `   <strong>Longitude:</strong> ${lng.toFixed(6)}<br>`;
                        html += `</div>`;
                        if (accuracy) {
                            html += `   <span class="${precisaoClass}">🎯 Precisão: ±${accuracy.toFixed(0)}m (${precisaoText})</span><br>`;
                        }
                        html += `   <small style="color:#cdb7e6;">Clique no botão azul acima para ver no mapa</small>`;
                        html += `</div>`;
                        
                        // MOSTRAR BOTÃO DO MAPA
                        mapaBtn.classList.add('visivel');
                    } else {
                        html += `📍 <strong>Localização não compartilhada</strong>`;
                        mapaBtn.classList.remove('visivel');
                    }
                    
                    details.innerHTML = html;
                }
            } catch (e) {
                console.error('Erro:', e);
            }
        }
        
        // Iniciar busca automática
        setInterval(buscarAlertas, 2000);
        buscarAlertas();
        
        // Status de conexão
        setInterval(() => {
            document.getElementById('statusConexao').innerHTML = 
                navigator.onLine ? '🟢 Online' : '🔴 Offline';
        }, 5000);
    </script>
</body>
</html>
