<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoa de Confiança - Aurora Mulher Segura</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#7a00ff">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* CORREÇÃO DO BOTÃO REDONDO - EXATAMENTE IGUAL AO MODELO */
        .alert-button {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            margin-top: 20px;
            background: radial-gradient(circle at 50% 45%, rgba(255, 121, 218, 0.95), rgba(138, 36, 139, 0.65) 55%, rgba(40, 0, 60, 0.75));
            display: grid;
            place-items: center;
            text-align: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.5s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 14px rgba(255, 79, 200, 0.1), 0 0 0 32px rgba(164, 92, 255, 0.07), 0 20px 70px rgba(0, 0, 0, 0.55);
            user-select: none;
        }
        .alert-button .status {
            font-size: 28px;
            margin-top: 10px;
            letter-spacing: 0.18em;
            font-weight: 1000;
            color: #180013;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
        }
        .alert-button .message {
            font-size: 18px;
            margin-top: 5px;
            font-weight: normal;
        }
        .alert-button.active {
            background: radial-gradient(circle at 50% 45%, rgba(255, 79, 200, 0.95), rgba(182, 28, 28, 0.65) 55%, rgba(40, 0, 60, 0.75));
            animation: pulse 1.5s infinite;
        }
        .alert-button.active .status {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .map-button {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .map-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        .siren-status {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 12px;
            color: #ffd0f0;
        }
    </style>
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">🌸</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Pessoa de Confiança</div>
                    </div>
                </div>
                <div class="top-actions">
                    <button onclick="testSiren()" class="pill">🔊 Sirene</button>
                    <a href="/relatorio/pdf" class="pdf-btn">📄 PDF</a>
                    <button onclick="sairSistema()" class="pill">🚪 Sair</button>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">Central SOS</h1>
                <p class="center muted small">Olá, <strong>{{ display_name }}</strong></p>

                <div id="sirenStatus" class="siren-status">
                    🔊 Sirene: <span id="sirenStatusText">Desativada</span>
                </div>

                <div id="alertButton" class="alert-button">
                    <div class="status">🚨 AGUARDANDO ALERTA</div>
                    <div class="message">Nenhum alerta recebido</div>
                </div>

                <div id="alertInfo">
                    <p class="center muted small">⏳ Aguardando alertas...</p>
                </div>

                <div class="alert-info" id="locationInfo" style="display:none;">
                    <p class="small"><strong>📍 Última Localização:</strong></p>
                    <p class="small" id="locationText"></p>
                    <button id="openMapBtn" class="map-button">🗺️ Ver no Google Maps</button>
                </div>

                <div id="mapContainer" class="map-container" style="display:none;">
                    <iframe id="mapFrame" src="" frameborder="0"></iframe>
                </div>

                <!-- Botões de Ação -->
                <div class="action-buttons">
                    <button class="btn-action btn-reenviar" onclick="reenviarAlerta()">📤 Reenviar</button>
                    <button class="btn-action btn-limpar" onclick="limparAlerta()">🧹 Limpar</button>
                    <button class="btn-action btn-sair" onclick="sairSistema()">🚪 Sair</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="sirenSound" src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3" preload="auto"></audio>

    <script>
        const siren = document.getElementById('sirenSound');
        let sirenUnlocked = false;
        let lastAlertId = null;
        let alertaAtual = null;
        const alertButton = document.getElementById('alertButton');

        function testSiren() {
            sirenUnlocked = true;
            siren.play().catch(e => console.log('Áudio bloqueado:', e));
            alert('🔊 Sirene testada!\n\nO áudio está liberado para alertas futuros.');
            document.getElementById('sirenStatusText').textContent = 'Ativada';
        }

        function playSiren() {
            if (sirenUnlocked) {
                siren.play().catch(e => console.log('Erro ao tocar sirene:', e));
            }
        }

        function updateAlerts() {
            fetch('/api/last_alert')
                .then(r => r.json())
                .then(data => {
                    if (!data.ok || !data.last) {
                        return;
                    }

                    const alert = data.last;
                    
                    if (alert.id !== lastAlertId) {
                        lastAlertId = alert.id;
                        alertaAtual = alert;
                        
                        const alertInfo = document.getElementById('alertInfo');
                        const mapContainer = document.getElementById('mapContainer');
                        const mapFrame = document.getElementById('mapFrame');
                        const locationInfo = document.getElementById('locationInfo');
                        const locationText = document.getElementById('locationText');
                        const openMapBtn = document.getElementById('openMapBtn');

                        // Exibir informações do alerta
                        alertInfo.innerHTML = `
                            <div class="alert alert-danger">
                                <p><strong>🚨 ALERTA RECEBIDO</strong></p>
                                <p><strong>⏰ Horário:</strong> ${alert.ts}</p>
                                <p><strong>👤 Usuária:</strong> ${alert.name}</p>
                                <p><strong>🚨 Situação:</strong> ${alert.situation}</p>
                                <p><strong>📝 Mensagem:</strong> ${alert.message || '—'}</p>
                            </div>
                        `;

                        // Atualizar botão de alerta
                        alertButton.className = 'alert-button active';
                        alertButton.innerHTML = `
                            <div class="status">🚨 ALERTA RECEBIDO</div>
                            <div class="message">${alert.situation}</div>
                        `;

                        // Exibir localização correta
                        if (alert.location) {
                            const lat = alert.location.lat;
                            const lng = alert.location.lng;
                            
                            locationText.textContent = `Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
                            locationInfo.style.display = 'block';
                            
                            openMapBtn.onclick = () => {
                                mapContainer.style.display = 'block';
                                mapFrame.src = `https://www.google.com/maps?q=${lat},${lng}&z=16&output=embed`;
                            };
                        } else {
                            locationInfo.style.display = 'none';
                        }

                        // Tocar sirene
                        playSiren();
                        
                        console.log('🚨 Novo alerta recebido!');
                        console.log('ID:', alert.id);
                        console.log('Usuária:', alert.name);
                        console.log('Situação:', alert.situation);
                        if (alert.location) {
                            console.log('Localização:', alert.location.lat, alert.location.lng);
                        }
                    }
                })
                .catch(err => {
                    console.error('Erro ao atualizar alertas:', err);
                    setTimeout(updateAlerts, 5000);
                });
        }

        function reenviarAlerta() {
            if (!alertaAtual) {
                alert('⚠️ Nenhum alerta para reenviar');
                return;
            }

            if (confirm('Deseja reenviar o último alerta?')) {
                fetch('/api/send_alert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(alertaAtual)
                })
                .then(r => r.json())
                .then(res => {
                    if (res.ok) {
                        alert('✅ Alerta reenviado com sucesso!');
                    } else {
                        alert('❌ Erro ao reenviar alerta');
                    }
                })
                .catch(err => {
                    alert('❌ Erro ao reenviar alerta');
                });
            }
        }

        function limparAlerta() {
            const alertInfo = document.getElementById('alertInfo');
            const locationInfo = document.getElementById('locationInfo');
            const mapContainer = document.getElementById('mapContainer');
            const alertButton = document.getElementById('alertButton');

            alertInfo.innerHTML = '<p class="center muted small">⏳ Aguardando alertas...</p>';
            locationInfo.style.display = 'none';
            mapContainer.style.display = 'none';
            alertButton.className = 'alert-button';
            alertButton.innerHTML = `
                <div class="status">🚨 AGUARDANDO ALERTA</div>
                <div class="message">Nenhum alerta recebido</div>
            `;
            alertaAtual = null;
        }

        function sairSistema() {
            if (confirm('Deseja realmente sair do painel da pessoa de confiança?')) {
                window.location.href = '/trusted/login';
            }
        }

        // Atualizar a cada 3 segundos
        setInterval(updateAlerts, 3000);
        updateAlerts();
    </script>
</body>
</html>
