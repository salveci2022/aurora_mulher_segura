<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Aurora Mulher Segura</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#7a00ff">

<link rel="icon" type="image/png" href="{{ url_for('static', filename='icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
background:#2d0045;
font-family:Arial;
text-align:center;
color:white;
}

.painel-central{
margin-top:80px;
}

.card{
background:#4c0073;
padding:30px;
border-radius:12px;
width:320px;
margin:auto;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-mapa{
background:#3da6ff;
color:white;
}

.btn-parar{
background:#ff5c5c;
color:white;
}

.btn-limpar{
background:#ffaa00;
color:white;
}

.btn-reenviar{
background:#00c853;
color:white;
}

.btn-sair{
background:#444;
color:white;
}

.alerta{
animation:piscando 1s infinite;
}

@keyframes piscando{
0%{background:#4c0073;}
50%{background:#8b0000;}
100%{background:#4c0073;}
}

</style>

</head>

<body>

<div class="painel-central">

<h1>🚨 CENTRAL SOS</h1>

<div id="card" class="card">

<h2 id="status">Aguardando alerta...</h2>

<p id="nome">Nome: ---</p>

<p id="situacao">Situação: ---</p>

<p id="hora">Hora: ---</p>

</div>

<br>

<button class="btn-mapa" onclick="abrirMapa()">
📍 ABRIR LOCALIZAÇÃO NO MAPA
</button>

<br>

<button class="btn-parar" onclick="pararSirene()">
🔕 PARAR SIRENE
</button>

<br><br>

<button class="btn-reenviar" onclick="reenviarAlerta()">
🔁 REENVIAR ALERTA
</button>

<button class="btn-limpar" onclick="limparAlerta()">
🧹 LIMPAR
</button>

<button class="btn-sair" onclick="sair()">
🚪 SAIR
</button>

</div>

<audio id="sirene" loop>
<source src="/static/sirene.mp3" type="audio/mpeg">
</audio>

<script>

let ultimo = null

function atualizar(){

fetch("/api/last_alert")

.then(r=>r.json())

.then(data=>{

if(!data.last) return

if(ultimo == data.last.hora) return

ultimo = data.last.hora

document.getElementById("status").innerText="🚨 ALERTA RECEBIDO"

document.getElementById("nome").innerText="Nome: "+data.last.nome

document.getElementById("situacao").innerText="Situação: "+data.last.situacao

document.getElementById("hora").innerText="Hora: "+data.last.hora

document.getElementById("card").classList.add("alerta")

document.getElementById("sirene").play()

window.ultimaLocalizacao=data.last.localizacao

})

}

setInterval(atualizar,2000)

function pararSirene(){

document.getElementById("sirene").pause()

}

function abrirMapa(){

if(!window.ultimaLocalizacao){

alert("Localização não disponível")

return

}

window.open(
"https://maps.google.com/?q="+window.ultimaLocalizacao,
"_blank"
)

}

function limparAlerta(){

fetch("/api/clear_alerts")

.then(()=>{

location.reload()

})

}

function reenviarAlerta(){

fetch("/api/resend_alert")

}

function sair(){

window.location="/trusted/logout"

}

</script>

</body>

</html>
