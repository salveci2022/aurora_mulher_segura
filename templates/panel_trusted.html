<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pessoa de Confiança - Aurora</title>

<style>

body{
background:#0b0018;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
background:#1a0033;
padding:30px;
border-radius:20px;
max-width:500px;
margin:auto;
box-shadow:0 0 30px rgba(255,0,120,0.4);
}

h1{
color:#ff4fc8;
}

.alert{
background:#2b004d;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.alert strong{
color:#ff4fc8;
}

#mapLink{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#ff4fc8;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

#mapLink:hover{
background:#ff1493;
}

.blink{

animation:blink 1s infinite;

}

@keyframes blink{

0%{background:#5b0000;}
50%{background:#ff0000;}
100%{background:#5b0000;}

}

</style>

</head>


<body>

<div class="card">

<h1>🚨 ALERTA AURORA</h1>

<p>Painel da Pessoa de Confiança</p>

<div class="alert" id="alertBox">

<p><strong>Nome:</strong> <span id="alertName">---</span></p>

<p><strong>Situação:</strong> <span id="alertSituation">---</span></p>

<p><strong>Horário:</strong> <span id="alertTime">---</span></p>

<a id="mapLink" target="_blank">📍 Abrir localização</a>

</div>

</div>



<script>

let lastId = 0;

async function verificarAlerta(){

    try{

        const res = await fetch("/api/last_alert");

        const data = await res.json();

        if(data.ok && data.last){

            const a = data.last;

            if(a.id != lastId){

                lastId = a.id;

                document.getElementById("alertName").innerText = a.name;

                document.getElementById("alertSituation").innerText = a.situation;

                document.getElementById("alertTime").innerText = a.ts_br;

                document.getElementById("alertBox").classList.add("blink");

                if(a.location){

                    const lat = a.location.lat;

                    const lng = a.location.lng;

                    document.getElementById("mapLink").href =
                    "https://maps.google.com/?q="+lat+","+lng;

                }

                tocarSirene();

            }

        }

    }catch(e){

        console.log("Erro alerta",e);

    }

}


function tocarSirene(){

    const audio = new Audio("/static/audio/sirene.mp3");

    audio.loop = true;

    audio.play().catch(()=>{});

}


setInterval(verificarAlerta,3000);

</script>


</body>
</html>
