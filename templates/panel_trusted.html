<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel · Pessoa de Confiança</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .sirene-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, #ff4fc8, #a45cff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            cursor: pointer;
            border: 4px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
            font-size: 40px;
            color: white;
        }
        
        .sirene-btn.ativa {
            background: radial-gradient(circle at 50% 45%, #ff9800, #f57c00);
            animation: pulse 1s infinite;
            box-shadow: 0 0 30px #ff9800;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        #alertBox {
            background: rgba(255,79,200,0.1);
            border: 2px solid #ff4fc8;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            transition: all 0.5s;
        }
        
        #alertBox.novo {
            background: rgba(255,152,0,0.3);
            border-color: #ff9800;
            box-shadow: 0 0 30px rgba(255,152,0,0.5);
            animation: brilho 1s infinite;
        }
        
        @keyframes brilho {
            0% { box-shadow: 0 0 10px #ff9800; }
            50% { box-shadow: 0 0 30px #ff9800; }
            100% { box-shadow: 0 0 10px #ff9800; }
        }
        
        .acoes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .acao-btn {
            padding: 15px 5px;
            border-radius: 30px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reenviar { background: #ff9800; }
        .limpar { background: #9c27b0; }
        .sair { background: #f44336; }
        
        .acao-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .mapa-btn {
            width: 100%;
            padding: 12px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            display: none;
        }
        
        .loc-info {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-family: monospace;
        }
        
        .loc-exata {
            color: #4caf50;
            font-weight: bold;
        }
    </style>
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">🌸</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Pessoa de Confiança</div>
                    </div>
                </div>
                <div class="top-actions">
                    <span id="statusConexao">🟢 Online</span>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">CENTRAL DE ALERTAS</h1>
                <p class="center muted small">Olá, <strong>{{ display_name }}</strong></p>

                <!-- BOTÃO DA SIRENE (REDONDO) -->
                <div class="sirene-btn" id="sireneBtn">
                    <span>🔔</span>
                    <small style="font-size:14px;">SIRENE</small>
                </div>

                <!-- BOTÃO DO MAPA -->
                <button class="mapa-btn" id="mapaBtn">📍 ABRIR LOCALIZAÇÃO EXATA NO MAPA</button>

                <!-- ÁREA DO ALERTA -->
                <div id="alertBox">
                    <div id="lastMeta" style="font-size:18px; color:#ff4fc8; margin-bottom:10px;">
                        ⏳ Aguardando alertas...
                    </div>
                    <div id="details" style="color:white; line-height:1.8;"></div>
                </div>

                <!-- BOTÕES DE AÇÃO -->
                <div class="acoes-grid">
                    <button class="acao-btn reenviar" id="reenviarBtn">🔄 Reenviar</button>
                    <button class="acao-btn limpar" id="limparBtn">🗑️ Limpar</button>
                    <button class="acao-btn sair" id="sairBtn">🚪 Sair</button>
                </div>

                <!-- STATUS -->
                <div class="status-bar" style="background:rgba(0,0,0,0.3); padding:12px; border-radius:30px; text-align:center;">
                    Sistema monitorando alertas em tempo real
                </div>
            </div>
        </div>
    </div>

    <script>
        const lastMeta = document.getElementById('lastMeta');
        const details = document.getElementById('details');
        const alertBox = document.getElementById('alertBox');
        const sireneBtn = document.getElementById('sireneBtn');
        const mapaBtn = document.getElementById('mapaBtn');
        let lastId = 0;
        let sireneAtiva = true; // Começa ATIVADA por padrão
        let ultimoAlerta = null;
        
        // ===== SIRENE QUE FUNCiona 100% AUTOMÁTICA =====
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let sireneInterval = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }
        
        function playSirene() {
            if (!sireneAtiva) return;
            
            const ctx = initAudio();
            if (!ctx) return;
            
            // Parar sons anteriores
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                try { oscillator.disconnect(); } catch(e) {}
            }
            if (gainNode) {
                try { gainNode.disconnect(); } catch(e) {}
            }
            
            // Criar novo som
            oscillator = ctx.createOscillator();
            gainNode = ctx.createGain();
            
            oscillator.type = 'sine';
            gainNode.gain.value = 0.3;
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            const now = ctx.currentTime;
            
            // Efeito de sirene real (sobe e desce)
            oscillator.frequency.setValueAtTime(600, now);
            oscillator.frequency.linearRampToValueAtTime(1000, now + 0.2);
            oscillator.frequency.linearRampToValueAtTime(600, now + 0.4);
            oscillator.frequency.linearRampToValueAtTime(1000, now + 0.6);
            oscillator.frequency.linearRampToValueAtTime(600, now + 0.8);
            
            oscillator.start(now);
            oscillator.stop(now + 1);
            
            // Continuar tocando enquanto houver alerta
            if (sireneAtiva && document.getElementById('alertBox').classList.contains('novo')) {
                setTimeout(playSirene, 1000);
            }
        }
        
        function pararSirene() {
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                try { oscillator.disconnect(); } catch(e) {}
            }
            if (gainNode) {
                try { gainNode.disconnect(); } catch(e) {}
            }
        }
        
        // Botão da sirene (para ativar/desativar)
        sireneBtn.addEventListener('click', () => {
            sireneAtiva = !sireneAtiva;
            sireneBtn.classList.toggle('ativa', sireneAtiva);
            
            if (sireneAtiva) {
                initAudio();
            } else {
                pararSirene();
            }
        });
        
        // ATIVAR SIRENE AUTOMATICAMENTE ao carregar a página
        window.addEventListener('load', () => {
            setTimeout(() => {
                initAudio();
                sireneBtn.classList.add('ativa');
            }, 1000);
        });
        
        // CLIQUE EM QUALQUER LUGAR para garantir que o áudio funciona
        document.addEventListener('click', () => {
            initAudio();
        }, { once: true });
        
        // ===== MAPA COM LOCALIZAÇÃO EXATA =====
        mapaBtn.addEventListener('click', () => {
            if (ultimoAlerta?.location) {
                const {lat, lng} = ultimoAlerta.location;
                // Usar precisão de 6 casas decimais (metros)
                window.open(`https://www.google.com/maps?q=${lat.toFixed(6)},${lng.toFixed(6)}`, '_blank');
            }
        });
        
        // ===== BOTÕES =====
        document.getElementById('reenviarBtn').onclick = () => {
            alert('Função de reenvio em desenvolvimento');
        };
        
        document.getElementById('limparBtn').onclick = () => {
            if (confirm('Deseja limpar o alerta atual?')) {
                lastMeta.innerHTML = '⏳ Alertas limpos';
                details.innerHTML = '';
                alertBox.classList.remove('novo');
                mapaBtn.style.display = 'none';
                ultimoAlerta = null;
                pararSirene();
            }
        };
        
        document.getElementById('sairBtn').onclick = () => {
            if (confirm('Deseja realmente sair?')) {
                window.location.href = '/logout_trusted';
            }
        };
        
        // ===== BUSCAR ALERTAS EM TEMPO REAL =====
        async function buscarAlertas() {
            try {
                const response = await fetch('/api/last_alert?ts=' + Date.now());
                const data = await response.json();
                
                if (data.ok && data.last) {
                    const alerta = data.last;
                    
                    // VERIFICAR SE É NOVO ALERTA
                    if (alerta.id > lastId) {
                        lastId = alerta.id;
                        ultimoAlerta = alerta;
                        
                        // Destacar visualmente
                        alertBox.classList.add('novo');
                        
                        // TOCAR SIRENE AUTOMATICAMENTE!
                        if (sireneAtiva) {
                            playSirene();
                        }
                        
                        // Atualizar status
                        const statusBar = document.querySelector('.status-bar');
                        statusBar.innerHTML = `🚨 NOVO ALERTA #${alerta.id} recebido!`;
                        statusBar.style.background = 'rgba(255,152,0,0.3)';
                        
                        setTimeout(() => {
                            statusBar.innerHTML = 'Sistema monitorando alertas em tempo real';
                            statusBar.style.background = 'rgba(0,0,0,0.3)';
                        }, 5000);
                    }
                    
                    // Mostrar horário no formato brasileiro
                    if (alerta.ts_br) {
                        lastMeta.innerHTML = `<strong>🚨 ALERTA #${alerta.id}</strong> - ${alerta.ts_br}`;
                    } else {
                        const data = new Date(alerta.ts);
                        const dataBr = data.toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
                        lastMeta.innerHTML = `<strong>🚨 ALERTA #${alerta.id}</strong> - ${dataBr}`;
                    }
                    
                    // DETALHES DO ALERTA
                    let html = '';
                    html += `👤 <strong>Nome:</strong> ${alerta.name || 'Não informado'}<br>`;
                    html += `⚠️ <strong>Situação:</strong> ${alerta.situation}<br>`;
                    
                    if (alerta.message) {
                        html += `💬 <strong>Mensagem:</strong> ${alerta.message}<br>`;
                    }
                    
                    // LOCALIZAÇÃO EXATA
                    if (alerta.location) {
                        const loc = alerta.location;
                        const lat = loc.lat || loc.latitude;
                        const lng = loc.lng || loc.longitude;
                        const accuracy = loc.accuracy;
                        
                        html += `<div class="loc-info">`;
                        html += `📍 <strong class="loc-exata">LOCALIZAÇÃO EXATA:</strong><br>`;
                        html += `   <span style="color:#ff4fc8;">Latitude:</span> ${lat.toFixed(6)}<br>`;
                        html += `   <span style="color:#ff4fc8;">Longitude:</span> ${lng.toFixed(6)}<br>`;
                        if (accuracy) {
                            let precisaoTexto = accuracy < 10 ? 'EXCELENTE' : accuracy < 30 ? 'BOA' : 'MÉDIA';
                            html += `   🎯 <span style="color:#4caf50;">Precisão: ±${accuracy.toFixed(0)}m (${precisaoTexto})</span><br>`;
                        }
                        html += `   <small style="color:#cdb7e6;">Clique no botão acima para ver no mapa</small>`;
                        html += `</div>`;
                        
                        mapaBtn.style.display = 'block';
                    } else {
                        html += `📍 <strong>Localização não compartilhada</strong>`;
                        mapaBtn.style.display = 'none';
                    }
                    
                    details.innerHTML = html;
                }
                
            } catch (e) {
                console.error('Erro ao buscar alertas:', e);
            }
        }
        
        // Iniciar busca automática
        setInterval(buscarAlertas, 2000);
        buscarAlertas();
        
        // Status de conexão
        setInterval(() => {
            document.getElementById('statusConexao').innerHTML = 
                navigator.onLine ? '🟢 Online' : '🔴 Offline';
        }, 5000);
    </script>
</body>
</html>
