<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confiança · Aurora</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .alert-live {
            animation: pulse-alert 1s infinite;
            border-color: #f44336 !important;
            background: rgba(244, 67, 54, 0.3) !important;
        }
        @keyframes pulse-alert {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            50% { box-shadow: 0 0 30px 20px rgba(244, 67, 54, 0); }
        }
        .map-container {
            width: 100%;
            height: 300px;
            border-radius: 12px;
            margin: 10px 0;
            overflow: hidden;
            border: 2px solid rgba(255, 98, 212, 0.3);
            display: none;
        }
        .map-container.active {
            display: block;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .location-info {
            background: rgba(76, 175, 80, 0.15);
            border: 2px solid #4caf50;
            border-radius: 14px;
            padding: 14px;
            margin: 14px 0;
            display: none;
        }
        .location-info.active {
            display: block;
        }
        .siren-btn {
            width: 150px;
            height: 150px;
            border-radius: 999px;
            border: 2px solid rgba(255, 208, 240, 0.55);
            background: radial-gradient(circle at 50% 45%, rgba(255, 121, 218, 0.95), rgba(138, 36, 139, 0.65) 55%, rgba(40, 0, 60, 0.75));
            display: grid;
            place-items: center;
            text-align: center;
            cursor: pointer;
            margin: 20px auto;
            transition: all 0.3s ease;
        }
        .siren-btn.active {
            animation: pulse 1s infinite;
            background: linear-gradient(135deg, #f44336 0%, #ff4fc8 100%) !important;
        }
        .siren-btn .siren-text {
            font-size: 32px;
            font-weight: 1000;
            color: #180013;
        }
        .siren-btn .siren-sub {
            font-size: 11px;
            font-weight: 1000;
            color: #220019;
            margin-top: 8px;
        }
        .siren-btn.active .siren-text,
        .siren-btn.active .siren-sub {
            color: white;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .action-btn {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 98, 212, 0.28);
            background: rgba(40, 0, 60, 0.35);
            color: var(--text);
            font-weight: 900;
            font-size: 12px;
            cursor: pointer;
        }
        .action-btn.danger {
            background: rgba(244, 67, 54, 0.2);
            border-color: rgba(244, 67, 54, 0.4);
        }
    </style>
</head>
<body>
    <div class="aurora-bg">
        <div class="center-wrap">
            <div class="aurora-card">
                <div class="topbar">
                    <div class="brand">
                        <div class="brand-dot">🔔</div>
                        <div>
                            <div class="brand-title">AURORA</div>
                            <div class="brand-sub">Central de Alertas</div>
                        </div>
                    </div>
                    <div class="top-actions">
                        <a href="/logout_trusted" class="pill">🚪 Sair</a>
                    </div>
                </div>
                
                <div class="content">
                    <h1 class="h1">👤 {{ display_name }}</h1>
                    <p class="center muted">Pessoa de Confiança</p>
                    
                    <div class="sos-wrap">
                        <div id="sirenBtn" class="siren-btn" onclick="toggleSiren()">
                            <div>
                                <div class="siren-text">🔔</div>
                                <div class="siren-sub">SIRENE</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="action-btn" onclick="clearAlerts()">🗑️ Limpar</button>
                        <button class="action-btn" onclick="location.reload()">🔄 Reiniciar</button>
                        <button class="action-btn danger" onclick="stopSiren()">⏹️ Parar</button>
                    </div>
                    
                    <div id="noAlerts" class="alert center">
                        ⏳ Aguardando alertas...
                    </div>
                    
                    <div id="alertContainer" style="display: none;">
                        <div class="item alert-live">
                            <div>
                                <div style="font-weight: 900; color: var(--hot); font-size: 14px;" id="alertSituation">
                                    --
                                </div>
                                <div class="small muted" id="alertTime">
                                    --
                                </div>
                                <div class="small" id="alertMessage" style="margin-top: 4px;">
                                    --
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="locationInfo" class="location-info">
                        <div style="font-weight: 900; margin-bottom: 8px; color: #4caf50;">
                            📍 LOCALIZAÇÃO EXATA
                        </div>
                        <div style="font-family: monospace; font-size: 13px; color: var(--text); word-break: break-all;" id="locationCoords">
                            Aguardando...
                        </div>
                        <div style="margin-top: 8px; font-size: 12px; color: var(--muted);">
                            Precisão: <span id="gpsAccuracy">--</span>
                        </div>
                    </div>
                    
                    <div id="mapContainer" class="map-container">
                        <!-- Mapa será inserido aqui -->
                    </div>
                    
                    <a id="mapsLink" href="#" target="_blank" class="btn btn-primary" style="display: none;">
                        🗺️ ABRIR NO GOOGLE MAPS
                    </a>
                    
                    <div class="info-box">
                        <p class="small muted">
                            🔔 <strong>Sirene:</strong> Toque para ativar/desativar<br>
                            🚨 <strong>Auto-alerta:</strong> Atualiza a cada 3s<br>
                            📍 <strong>GPS:</strong> Localização em tempo real
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <audio id="sirenAudio" loop>
        <source src="/static/audio/sirene.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        let lastAlertId = null;
        let sirenPlaying = false;

        function playSiren() {
            const audio = document.getElementById('sirenAudio');
            audio.play().then(() => {
                sirenPlaying = true;
                document.getElementById('sirenBtn').classList.add('active');
            }).catch(e => console.log('Audio error:', e));
        }

        function stopSiren() {
            const audio = document.getElementById('sirenAudio');
            audio.pause();
            audio.currentTime = 0;
            sirenPlaying = false;
            document.getElementById('sirenBtn').classList.remove('active');
        }

        function toggleSiren() {
            if (sirenPlaying) {
                stopSiren();
            } else {
                playSiren();
            }
        }

        function clearAlerts() {
            document.getElementById('alertContainer').style.display = 'none';
            document.getElementById('noAlerts').style.display = 'block';
            document.getElementById('locationInfo').classList.remove('active');
            document.getElementById('mapContainer').classList.remove('active');
            document.getElementById('mapsLink').style.display = 'none';
            stopSiren();
            lastAlertId = null;
        }

        function updateMap(lat, lng, accuracy) {
            const mapContainer = document.getElementById('mapContainer');
            const locationInfo = document.getElementById('locationInfo');
            const coordsDiv = document.getElementById('locationCoords');
            const accuracyDiv = document.getElementById('gpsAccuracy');
            const mapsLink = document.getElementById('mapsLink');
            
            coordsDiv.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            accuracyDiv.textContent = `±${Math.round(accuracy)} metros`;
            
            // Google Maps Embed
            mapContainer.innerHTML = `
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.1975778892866!2d${lng}!3d${lat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zwrAsIMKs!5e0!3m2!1spt-BR!2sbr!4v1234567890"
                    allowfullscreen="" 
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            `;
            
            mapsLink.href = `https://www.google.com/maps?q=${lat},${lng}`;
            
            locationInfo.classList.add('active');
            mapContainer.classList.add('active');
            mapsLink.style.display = 'block';
        }

        async function loadAlerts() {
            try {
                const response = await fetch('/api/alerts');
                const alerts = await response.json();
                
                if (alerts && alerts.length > 0) {
                    const lastAlert = alerts[alerts.length - 1];
                    
                    if (lastAlert.id !== lastAlertId) {
                        console.log('🚨 NOVO ALERTA!', lastAlert);
                        lastAlertId = lastAlert.id;
                        
                        document.getElementById('noAlerts').style.display = 'none';
                        document.getElementById('alertContainer').style.display = 'block';
                        document.getElementById('alertSituation').textContent = `⚠️ ${lastAlert.situation || 'Emergência'}`;
                        document.getElementById('alertTime').textContent = `${lastAlert.name || 'Usuária'} • ${lastAlert.ts_br || lastAlert.ts || 'Agora'}`;
                        document.getElementById('alertMessage').textContent = lastAlert.message || '';
                        
                        playSiren();
                        
                        if (lastAlert.lat && lastAlert.lng) {
                            updateMap(
                                parseFloat(lastAlert.lat),
                                parseFloat(lastAlert.lng),
                                parseFloat(lastAlert.accuracy || 10)
                            );
                        }
                    }
                }
            } catch (error) {
                console.error('Erro ao carregar alertas:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadAlerts();
            setInterval(loadAlerts, 3000);
        });
    </script>
</body>
</html>
