<!doctype html>
<html lang="pt-br">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aurora - Painel da Pessoa de Confiança</title>

<style>

body{
background:#1b0033;
font-family:Arial;
color:white;
margin:0;
padding:20px;
}

.header{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.alerta{
padding:20px;
border-radius:15px;
background:#33004d;
margin-bottom:20px;
transition:0.3s;
}

.alerta_ativo{
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{background:#ff0033;}
50%{background:#ff66aa;}
100%{background:#ff0033;}

}

#map{
width:100%;
height:350px;
border-radius:15px;
margin-top:20px;
}

#ativar{
margin-top:10px;
padding:10px;
border:none;
background:#ff0055;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>

<script src="https://maps.googleapis.com/maps/api/js"></script>

</head>

<body>

<div class="header">
🚨 CENTRAL DE ALERTA AURORA
</div>

<!-- BOTÃO PARA LIBERAR AUDIO -->
<button onclick="ativarAudio()" id="ativar">
Ativar som
</button>

<div id="alertBox" class="alerta">

Aguardando alerta...

</div>

<div id="map"></div>

<!-- SIRENE -->
<audio id="sirene" preload="auto">
<source src="/static/siren.mp3" type="audio/mpeg">
</audio>

<script>

let map
let marker
let ultimoID = null

function iniciarMapa(){

map = new google.maps.Map(document.getElementById("map"),{

zoom:15,
center:{lat:-15.78,lng:-47.92}

})

}

function ativarAudio(){

const audio = document.getElementById("sirene")

audio.play().then(()=>{

audio.pause()
audio.currentTime = 0

document.getElementById("ativar").style.display="none"

})

}

function tocarSirene(){

const audio = document.getElementById("sirene")

audio.currentTime = 0

audio.play().catch(()=>{

console.log("Navegador bloqueou autoplay")

})

}

function atualizarPainel(){

fetch("/api/last_alert")

.then(r=>r.json())

.then(data=>{

if(!data.last) return

let alerta = data.last

if(alerta.id === ultimoID) return

ultimoID = alerta.id

document.getElementById("alertBox").innerHTML =

`<b>🚨 ALERTA RECEBIDO</b><br><br>
Nome: ${alerta.name}<br>
Situação: ${alerta.situation}<br>
Mensagem: ${alerta.message}<br>
Hora: ${alerta.ts_br}`

document.getElementById("alertBox").classList.add("alerta_ativo")

tocarSirene()

if(alerta.location){

let lat = alerta.location.lat
let lng = alerta.location.lng

let pos = {lat:lat,lng:lng}

map.setCenter(pos)

if(!marker){

marker = new google.maps.Marker({

position:pos,
map:map

})

}else{

marker.setPosition(pos)

}

}

})

}

iniciarMapa()

setInterval(atualizarPainel,2000)

</script>

</body>

</html>
