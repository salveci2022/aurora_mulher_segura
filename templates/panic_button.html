<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora Mulher Segura</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#7a00ff">

<link rel="icon" href="{{ url_for('static', filename='icon-192.png') }}">

<style>

body{
background:linear-gradient(135deg,#2a003f,#4b006e);
font-family:Arial;
margin:0;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.card{

background:#2a003f;
border-radius:18px;
padding:25px;
max-width:420px;
width:100%;
box-shadow:0 0 30px rgba(0,0,0,0.5);

}

h1{
margin:0;
font-size:20px;
}

h2{
color:#ff4fd8;
margin-top:10px;
}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;

}

.option{

background:#3a0055;
padding:12px;
border-radius:12px;
cursor:pointer;
text-align:center;

}

.option.active{

background:#ff4fd8;

}

input,textarea{

width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#1b002a;
color:white;

}

textarea{

height:80px;

}

.sos{

margin-top:25px;
width:200px;
height:200px;
border-radius:50%;
background:radial-gradient(circle,#ff4fd8,#7a00ff);
border:none;
font-size:28px;
color:white;
cursor:pointer;

}

.center{

text-align:center;

}

.status{

margin-top:15px;
opacity:0.8;

}

.loc{

background:#1b002a;
padding:10px;
border-radius:10px;
margin-top:15px;

}

.pdf{

margin-top:15px;
background:#00c853;
padding:12px;
border:none;
border-radius:10px;
width:100%;
color:white;
font-weight:bold;
cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>AURORA</h1>
<h2>🚨 Painel da Mulher - SOS 24h</h2>

<p>Toque no botão SOS para enviar alerta</p>

<div class="grid">

<div class="option" onclick="setSit('Assédio')">🚫 Assédio</div>
<div class="option" onclick="setSit('Violência')">👊 Violência</div>
<div class="option" onclick="setSit('Perseguição')">👀 Perseguição</div>
<div class="option" onclick="setSit('Emergência médica')">🏥 Emergência</div>
<div class="option" onclick="setSit('Local suspeito')">⚠ Local suspeito</div>
<div class="option" onclick="setSit('Outro')">❓ Outro</div>

</div>

<input id="nome" value="SALVECI DOS SANTOS">

<textarea id="msg">Preciso de ajuda urgente!</textarea>

<div class="center">

<button class="sos" onclick="enviarSOS()">
SOS
</button>

</div>

<div id="status" class="status">
Sistema pronto
</div>

<div class="loc">

📍 Localização

<div id="gps">
Obtendo localização...
</div>

</div>

<button class="pdf">
BAIXAR RELATÓRIO COMPLETO (PDF)
</button>

</div>

<script>

let situacao=""

function setSit(s){

situacao=s

document.querySelectorAll(".option").forEach(o=>o.classList.remove("active"))

event.target.classList.add("active")

}

function enviarSOS(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude
let lon=pos.coords.longitude

let alerta={

nome:document.getElementById("nome").value,
situacao:situacao,
localizacao:lat+","+lon

}

fetch("/api/alert",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(alerta)

})

.then(()=>{

document.getElementById("status").innerText="🚨 ALERTA ENVIADO"

})

})

}

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("gps").innerHTML=

"Latitude: "+pos.coords.latitude+
"<br>Longitude: "+pos.coords.longitude

})
async function capturarSelfie(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({ video:true });

        const video = document.createElement("video");

        video.srcObject = stream;

        await new Promise(r => setTimeout(r,1200));

        const canvas = document.createElement("canvas");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");

        ctx.drawImage(video,0,0);

        stream.getTracks().forEach(t => t.stop());

        return canvas.toDataURL("image/jpeg");

    }catch(e){

        return null

    }

}
</script>

</body>
</html>
