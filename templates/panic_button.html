<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora Mulher Segura</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#7a00ff">

<style>

body{
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#3b0057,#1a0028);
color:white;
padding:20px;
margin:0;
}

.container{
max-width:420px;
margin:auto;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
border-radius:20px;
padding:25px;
box-shadow:0 0 25px rgba(255,0,200,0.3);
}

.situations{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.situation-btn{
background:rgba(255,255,255,0.05);
border:2px solid rgba(255,0,200,0.4);
padding:10px;
border-radius:10px;
cursor:pointer;
color:white;
}

.situation-btn.active{
background:#ff2ac3;
}

.form-input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
margin-bottom:10px;
}

.sos{
width:180px;
height:180px;
border-radius:50%;
border:none;
background:radial-gradient(circle,#ff4bd1,#7a00ff);
font-size:40px;
color:white;
margin:auto;
display:block;
cursor:pointer;
}

.status{
text-align:center;
margin-top:15px;
}

.gps{
margin-top:15px;
font-size:13px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center">🚨 AURORA SOS</h2>

<div class="situations">

<button class="situation-btn" onclick="selectSituation(this,'Assédio')">Assédio</button>
<button class="situation-btn" onclick="selectSituation(this,'Violência')">Violência</button>
<button class="situation-btn" onclick="selectSituation(this,'Perseguição')">Perseguição</button>
<button class="situation-btn" onclick="selectSituation(this,'Emergência')">Emergência</button>

</div>

<input id="name" class="form-input" placeholder="Seu nome">

<input id="message" class="form-input" value="Preciso de ajuda urgente!">

<button class="sos" onclick="sendAlert()">SOS</button>

<div class="status" id="status">Sistema pronto</div>

<div class="gps" id="gps">Aguardando GPS...</div>

</div>

<script>

let situation=null
let location=null

function selectSituation(btn,s){

document.querySelectorAll(".situation-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

situation=s

}

navigator.geolocation.watchPosition(pos=>{

location={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

document.getElementById("gps").innerText=
"Lat: "+location.lat+
"\nLng: "+location.lng

})

async function sendAlert(){

if(!situation){
alert("Selecione uma situação")
return
}

if(!location){
alert("GPS não encontrado")
return
}

const data={
nome:document.getElementById("name").value,
situacao:situation,
mensagem:document.getElementById("message").value,
lat:location.lat,
lng:location.lng
}

const res=await fetch("/api/alert",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

const r=await res.json()

if(r.status=="ok"){
document.getElementById("status").innerText="🚨 ALERTA ENVIADO"
navigator.vibrate?.([200,100,200])
}

}

</script>
<script>

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("/static/service-worker.js")
.then(() => console.log("Service Worker registrado"));

}

</script>
</body>
</html>
