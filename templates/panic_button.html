<!DOCTYPE html>
<html lang="pt-br">

<head>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff00cc">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aurora SOS</title>

<style>

body{
background:#2b0048;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.app{
width:380px;
background:#3a0063;
border-radius:25px;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
color:white;
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#ff4db8;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.chip{
padding:10px;
background:#4a007a;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.chip.active{
background:#ff4db8;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#24003f;
color:white;
}

textarea{
height:60px;
}

.sos{
width:160px;
height:160px;
border-radius:50%;
background:radial-gradient(circle,#ff6bd6,#9b5cff);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
margin:20px auto;
cursor:pointer;
box-shadow:0 0 40px #ff3bc7;
}

.status{
text-align:center;
margin-top:10px;
color:#ccc;
}

</style>

</head>

<body>

<div class="app">

<div class="title">AURORA</div>
<div class="subtitle">🚨 Painel da Mulher - SOS 24h</div>

<div>⚠ SITUAÇÃO</div>

<div class="grid">

<div class="chip active">Assédio</div>
<div class="chip">Violência</div>
<div class="chip">Perseguição</div>
<div class="chip">Emergência médica</div>
<div class="chip">Local suspeito</div>
<div class="chip">Outro</div>

</div>

<div>Seu nome</div>
<input id="nome" value="SALVECI DOS SANTOS">

<div>Mensagem</div>
<textarea id="msg">Preciso de ajuda urgente!</textarea>

<div class="sos" onclick="enviar()">SOS</div>

<div class="status" id="status">
Sistema pronto
</div>

</div>

<script>

let situacao = "Assédio"
let alertaEnviado = false

document.querySelectorAll(".chip").forEach(chip=>{

chip.onclick=()=>{

document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"))

chip.classList.add("active")

situacao = chip.innerText

}

})

function enviar(){

if(alertaEnviado) return

alertaEnviado = true

document.getElementById("status").innerText="Enviando alerta..."

navigator.geolocation.getCurrentPosition(pos=>{

fetch("/api/send_alert",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:document.getElementById("nome").value,
message:document.getElementById("msg").value,
situation:situacao,
lat:pos.coords.latitude,
lng:pos.coords.longitude,
accuracy:pos.coords.accuracy

})

})

.then(r=>r.json())

.then(()=>{

document.getElementById("status").innerText="🚨 ALERTA ENVIADO!"

})

})

}

</script>

</body>

<script>

if ('serviceWorker' in navigator) {

navigator.serviceWorker.register('/sw.js')
.then(function(){

console.log("Service Worker ativo")

})

}

</script>
</html>
