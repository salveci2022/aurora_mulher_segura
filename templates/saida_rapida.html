<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=https://www.google.com.br">
    <title>Previsão do Tempo</title>

        // Substitui o histórico para o botão "voltar" não retornar ao Aurora
        window.history.replaceState(null, '', 'https://www.google.com.br');
        window.location.replace('https://www.google.com.br');
    </script>
</head>
<body style="margin:0;background:#fff;"></body>
</html>
