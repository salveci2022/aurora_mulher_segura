<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .calculadora {
            max-width: 350px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .display {
            background: #eee;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 32px;
            font-weight: 300;
            color: #333;
            min-height: 80px;
            word-wrap: break-word;
        }
        
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .botao {
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .botao:hover {
            background: #e0e0e0;
        }
        
        .botao.operador {
            background: #ff4fc8;
            color: white;
        }
        
        .botao.operador:hover {
            background: #e63eaf;
        }
        
        .botao.igual {
            background: #4caf50;
            color: white;
        }
        
        .botao.limpar {
            background: #f44336;
            color: white;
        }
        
        .voltar-btn {
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <div class="display" id="display">0</div>
        
        <div class="botoes">
            <button class="botao limpar" onclick="limpar()">C</button>
            <button class="botao" onclick="adicionar('(')">(</button>
            <button class="botao" onclick="adicionar(')')">)</button>
            <button class="botao operador" onclick="adicionar('/')">÷</button>
            
            <button class="botao" onclick="adicionar('7')">7</button>
            <button class="botao" onclick="adicionar('8')">8</button>
            <button class="botao" onclick="adicionar('9')">9</button>
            <button class="botao operador" onclick="adicionar('*')">×</button>
            
            <button class="botao" onclick="adicionar('4')">4</button>
            <button class="botao" onclick="adicionar('5')">5</button>
            <button class="botao" onclick="adicionar('6')">6</button>
            <button class="botao operador" onclick="adicionar('-')">-</button>
            
            <button class="botao" onclick="adicionar('1')">1</button>
            <button class="botao" onclick="adicionar('2')">2</button>
            <button class="botao" onclick="adicionar('3')">3</button>
            <button class="botao operador" onclick="adicionar('+')">+</button>
            
            <button class="botao" onclick="adicionar('0')">0</button>
            <button class="botao" onclick="adicionar('.')">.</button>
            <button class="botao igual" colspan="2" onclick="calcular()">=</button>
        </div>
        
        <button class="voltar-btn" onclick="window.location.href='/panic'">← Voltar ao Aurora</button>
    </div>
    
    <script>
        let display = document.getElementById('display');
        
        function adicionar(valor) {
            if (display.innerText === '0' && valor !== '.') {
                display.innerText = valor;
            } else {
                display.innerText += valor;
            }
        }
        
        function limpar() {
            display.innerText = '0';
        }
        
        function calcular() {
            try {
                display.innerText = eval(display.innerText);
            } catch {
                display.innerText = 'Erro';
            }
        }
    </script>
</body>
</html>
