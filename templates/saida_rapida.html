<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo</title>
    <script>
        // Immediately replace history so back button won't return to Aurora
        window.history.replaceState(null, '', 'https://www.google.com.br');
        window.location.replace('https://www.google.com.br');
    </script>
</head>
<body>
    <p>Redirecionando...</p>
</body>
</html>
