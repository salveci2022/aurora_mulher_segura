<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .calculadora {
            max-width: 350px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .display {
            background: #eee;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 32px;
            font-weight: 300;
            color: #333;
            min-height: 80px;
            word-wrap: break-word;
        }
        
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .botao {
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .botao:hover {
            background: #e0e0e0;
        }
        
        .botao.operador {
            background: #ff4fc8;
            color: white;
        }
        
        .botao.operador:hover {
            background: #e63eaf;
        }
        
        .botao.igual {
            background: #4caf50;
            color: white;
        }
        
        .botao.limpar {
            background: #f44336;
            color: white;
        }
        
        .voltar-btn {
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .voltar-btn:hover {
            background: #1976d2;
            transform: translateY(-2px);
        }
        
        .info {
            text-align: center;
            margin-top: 15px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <div class="display" id="display">0</div>
        
        <div class="botoes">
            <button class="botao limpar" onclick="limpar()">C</button>
            <button class="botao" onclick="adicionar('(')">(</button>
            <button class="botao" onclick="adicionar(')')">)</button>
            <button class="botao operador" onclick="adicionar('/')">÷</button>
            
            <button class="botao" onclick="adicionar('7')">7</button>
            <button class="botao" onclick="adicionar('8')">8</button>
            <button class="botao" onclick="adicionar('9')">9</button>
            <button class="botao operador" onclick="adicionar('*')">×</button>
            
            <button class="botao" onclick="adicionar('4')">4</button>
            <button class="botao" onclick="adicionar('5')">5</button>
            <button class="botao" onclick="adicionar('6')">6</button>
            <button class="botao operador" onclick="adicionar('-')">-</button>
            
            <button class="botao" onclick="adicionar('1')">1</button>
            <button class="botao" onclick="adicionar('2')">2</button>
            <button class="botao" onclick="adicionar('3')">3</button>
            <button class="botao operador" onclick="adicionar('+')">+</button>
            
            <button class="botao" onclick="adicionar('0')">0</button>
            <button class="botao" onclick="adicionar('.')">.</button>
            <button class="botao igual" onclick="calcular()">=</button>
        </div>
        
        <button class="voltar-btn" onclick="window.location.href='/panic'">← Voltar</button>
        <div class="info">Calculadora Simples</div>
    </div>
    
    <script>
        let display = document.getElementById('display');
        
        function adicionar(valor) {
            if (display.innerText === '0' && valor !== '.') {
                display.innerText = valor;
            } else {
                display.innerText += valor;
            }
        }
        
        function limpar() {
            display.innerText = '0';
        }
        
        function calcular() {
            try {
                // Versão segura sem eval()
                const expressao = display.innerText;
                
                // Verifica se a expressão contém apenas caracteres permitidos
                if (!/^[0-9+\-*/().\s]+$/.test(expressao)) {
                    throw new Error('Expressão inválida');
                }
                
                // Usa Function que é mais seguro que eval
                const resultado = new Function('return ' + expressao)();
                
                // Verifica se o resultado é um número válido
                if (isNaN(resultado) || !isFinite(resultado)) {
                    throw new Error('Resultado inválido');
                }
                
                display.innerText = resultado;
            } catch {
                display.innerText = 'Erro';
                setTimeout(() => {
                    display.innerText = '0';
                }, 1500);
            }
        }
        
        // Suporte para teclado
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                adicionar(key);
            } else if (key === '.') {
                adicionar('.');
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                adicionar(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calcular();
            } else if (key === 'Escape') {
                limpar();
            } else if (key === '(' || key === ')') {
                adicionar(key);
            } else if (key === 'Backspace') {
                // Apaga último caractere
                let atual = display.innerText;
                if (atual.length > 1) {
                    display.innerText = atual.slice(0, -1);
                } else {
                    display.innerText = '0';
                }
            }
        });
    </script>
</body>
</html>
