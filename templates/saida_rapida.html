<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .calculator {
            background: #16213e;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        
        .display {
            background: #0f0f23;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 36px;
            font-weight: 300;
            color: #fff;
            min-height: 80px;
            word-break: break-all;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        button {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-number {
            background: #1a1a2e;
            color: #fff;
        }
        
        .btn-operator {
            background: #e94560;
            color: #fff;
        }
        
        .btn-equals {
            background: #0f3460;
            color: #fff;
            grid-column: span 2;
        }
        
        .btn-clear {
            background: #533483;
            color: #fff;
        }
        
        .hidden-return {
            position: fixed;
            top: 15px;
            right: 15px;
            color: rgba(255,255,255,0.15);
            text-decoration: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 1000;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .hidden-return:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <a href="/panic" class="hidden-return" title="Fechar">✕</a>
    
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn-number" onclick="append('(')">(</button>
            <button class="btn-number" onclick="append(')')">)</button>
            <button class="btn-operator" onclick="append('/')">÷</button>
            
            <button class="btn-number" onclick="append('7')">7</button>
            <button class="btn-number" onclick="append('8')">8</button>
            <button class="btn-number" onclick="append('9')">9</button>
            <button class="btn-operator" onclick="append('*')">×</button>
            
            <button class="btn-number" onclick="append('4')">4</button>
            <button class="btn-number" onclick="append('5')">5</button>
            <button class="btn-number" onclick="append('6')">6</button>
            <button class="btn-operator" onclick="append('-')">-</button>
            
            <button class="btn-number" onclick="append('1')">1</button>
            <button class="btn-number" onclick="append('2')">2</button>
            <button class="btn-number" onclick="append('3')">3</button>
            <button class="btn-operator" onclick="append('+')">+</button>
            
            <button class="btn-number" onclick="append('0')">0</button>
            <button class="btn-number" onclick="append('.')">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>
    </div>
    
    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        
        function updateDisplay() {
            display.textContent = currentInput;
        }
        
        function append(value) {
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                currentInput += value;
            }
            updateDisplay();
        }
        
        function clearDisplay() {
            currentInput = '0';
            updateDisplay();
        }
        
        function calculate() {
            try {
                currentInput = eval(currentInput).toString();
            } catch {
                currentInput = 'Erro';
            }
            updateDisplay();
        }
        
        let escapeCount = 0;
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                escapeCount++;
                setTimeout(() => escapeCount = 0, 500);
                if (escapeCount >= 3) {
                    window.location.href = '/panic';
                }
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') append(e.key);
            if (e.key === '.') append('.');
            if (e.key === '+') append('+');
            if (e.key === '-') append('-');
            if (e.key === '*') append('*');
            if (e.key === '/') append('/');
            if (e.key === '(') append('(');
            if (e.key === ')') append(')');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') clearDisplay();
        });
    </script>
</body>
</html>
