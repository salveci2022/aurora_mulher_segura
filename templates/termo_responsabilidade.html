<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora - Termo de Responsabilidade</title>

<style>

/* TODO O SEU CSS FOI MANTIDO */

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}

body{
background:linear-gradient(135deg,#1a0033,#2d005a);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
}

.termo-container{
max-width:800px;
width:100%;
background:linear-gradient(145deg,#2d005a,#1a0033);
border-radius:40px;
padding:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.7);
border:1px solid rgba(255,79,200,0.3);
color:white;
}

h1{color:#ff4fc8;text-align:center;margin-bottom:20px;font-size:28px}

h2{color:#ffb0f0;margin:25px 0 15px;font-size:22px;text-align:center}

.clausula{
background:rgba(255,255,255,0.05);
border-left:4px solid #ff4fc8;
padding:15px;
margin-bottom:15px;
border-radius:0 15px 15px 0;
}

.checkbox-container{
display:flex;
align-items:center;
gap:10px;
margin:25px 0;
padding:15px;
background:rgba(255,79,200,0.1);
border-radius:15px;
}

.botoes{
display:flex;
gap:15px;
justify-content:center;
margin-top:30px;
}

.btn-aceitar{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
border:none;
border-radius:30px;
padding:15px 40px;
font-size:18px;
cursor:pointer;
}

.btn-recusar{
background:rgba(255,255,255,0.1);
border:1px solid #f44336;
color:#f44336;
border-radius:30px;
padding:15px 40px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="termo-container">

<h1>📜 TERMO DE RESPONSABILIDADE</h1>
<h2>AURORA MULHER SEGURA</h2>

<div class="clausula">
<p><b>1.</b> O sistema Aurora é ferramenta de apoio e não substitui autoridades.</p>
</div>

<div class="clausula">
<p><b>2.</b> Em emergências utilize também 190, 192 ou 193.</p>
</div>

<div class="clausula">
<p><b>3.</b> O funcionamento depende de GPS, internet e bateria.</p>
</div>

<div class="checkbox-container">
<input type="checkbox" id="aceitoTermo">
<label for="aceitoTermo">Li e ACEITO os termos</label>
</div>

<!-- FORMULÁRIO CORRETO PARA O FLASK -->

<form method="POST" action="/aceitar-termo">

<div class="botoes">

<button type="button" class="btn-recusar" onclick="recusarTermo()">NÃO ACEITO</button>

<button type="submit" class="btn-aceitar" id="btnAceitar" disabled>
ACEITO E CONTINUAR
</button>

</div>

</form>

</div>

<script>

document.getElementById("aceitoTermo").addEventListener("change",function(){

document.getElementById("btnAceitar").disabled=!this.checked

})

function recusarTermo(){

alert("Você precisa aceitar o termo para usar o Aurora.")

}

</script>

</body>
</html>
