<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confiança · Alterar Senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="aurora-bg">
    <div class="center-wrap">
        <div class="aurora-card">
            <div class="topbar">
                <div class="brand">
                    <div class="brand-dot">🌸</div>
                    <div>
                        <div class="brand-title">AURORA</div>
                        <div class="brand-sub">Alterar Senha</div>
                    </div>
                </div>
                <div class="top-actions">
                    <a href="/trusted/panel" class="pill">← Voltar</a>
                </div>
            </div>

            <div class="content">
                <h1 class="h1">Alterar senha</h1>

                {% if msg %}
                <div class="alert alert-ok center">{{ msg }}</div>
                {% endif %}
                {% if err %}
                <div class="alert alert-danger center">{{ err }}</div>
                {% endif %}

                <form method="POST" action="/trusted/change_password">
                    <label class="label">Senha atual</label>
                    <input type="password" name="old_password" class="input" required>

                    <label class="label">Nova senha</label>
                    <input type="password" name="new_password" class="input" required>

                    <button type="submit" class="btn btn-primary">Salvar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
