<!DOCTYPE html>
<html>
<head>

<title>Login Confiança</title>

</head>

<body style="background:#1a0028;color:white;font-family:Arial">

<h2>Login Pessoa de Confiança</h2>

{% if error %}
<div style="color:red">{{error}}</div>
{% endif %}

<form method="POST">

<input name="username" placeholder="Usuário">

<br><br>

<input name="password" type="password" placeholder="Senha">

<br><br>

<button type="submit">Entrar</button>

</form>

</body>
</html>
