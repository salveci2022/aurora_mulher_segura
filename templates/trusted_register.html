<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora - Cadastro Confiança</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1a0033,#2d005a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
width:350px;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ff4fc8,#7a00ff);
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>👥 Cadastrar Pessoa de Confiança</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Usuário"
required>

<input
type="password"
name="password"
placeholder="Senha"
required>

<button type="submit">
Cadastrar
</button>

</form>

</div>

</body>
</html>
